<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DnD 5e 电子人物卡</title>
<style>
:root{--bg:#1a1a1a;--panel:#252525;--panel-hi:#2f2f2f;--border:#3a3a3a;--text:#e0e0e0;--text-dim:#888;--accent:#c83232;--gold:#c8a032;--good:#6abe6a;--bad:#c83232;--shadow:rgba(0,0,0,.5)}
[data-theme=light]{--bg:#f4ecd8;--panel:#fff;--panel-hi:#f5f1e8;--border:#d4c8a8;--text:#2a1a0a;--text-dim:#756040;--accent:#8b1a1a;--gold:#8b6914;--shadow:rgba(0,0,0,.15)}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
.num{font-variant-numeric:tabular-nums}
button{cursor:pointer;background:var(--panel-hi);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:13px;font-family:inherit;min-height:32px}
button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
button:active{transform:translateY(1px)}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
button.primary:hover{filter:brightness(1.1)}
input,select,textarea{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:3px;padding:4px 6px;font-family:inherit;font-size:inherit;min-height:28px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
input[type=number]{width:60px;text-align:right}
header{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:2px solid var(--accent);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
header h1{margin:0;font-size:18px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
header h1 .meta{font-weight:normal;font-size:12px;color:var(--text-dim);margin-left:8px}
.toolbar{display:flex;gap:4px;flex-wrap:wrap}
.toolbar button{font-size:12px;padding:4px 8px;min-height:28px}
main{display:grid;gap:12px;padding:12px;grid-template-columns:1fr}
@media(min-width:700px){main{grid-template-columns:1fr 1fr;grid-auto-flow:dense}.panel.full{grid-column:1/-1}}
@media(min-width:1100px){main{grid-template-columns:1fr 1fr 1fr}}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px 12px;position:relative;z-index:1;min-width:0}
.panel h2{margin:0 0 8px;font-size:14px;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:4px;display:flex;align-items:center;gap:6px}
.panel h2 .sub{font-size:11px;color:var(--text-dim);font-weight:normal;margin-left:auto}
.combat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{background:var(--panel-hi);border:1px solid var(--border);border-radius:4px;padding:8px 4px;text-align:center;min-height:60px;position:relative}
.stat-box[data-roll]{cursor:pointer;border-color:var(--gold)}
.stat-box[data-roll]::after{content:'🎲';position:absolute;top:3px;right:5px;font-size:11px;opacity:.7}
.stat-box[data-roll]:hover{border-color:var(--accent);background:var(--bg)}
.stat-box .label{font-size:11px;color:var(--text-dim)}
.stat-box .val{font-size:22px;font-weight:bold}
.stat-box .sub{font-size:11px;color:var(--text-dim)}
.hp-bar{grid-column:1/-1;background:var(--panel-hi);border:1px solid var(--border);border-radius:4px;padding:8px;cursor:pointer}
.hp-bar .hp-num{font-size:22px;font-weight:bold}
.hp-bar .hp-bar-bg{background:var(--bg);height:8px;border-radius:4px;overflow:hidden;margin-top:6px}
.hp-bar .hp-bar-fg{background:var(--good);height:100%;transition:width .3s}
.hp-bar .hp-bar-fg.low{background:var(--gold)}
.hp-bar .hp-bar-fg.crit{background:var(--bad)}
.hp-row{display:flex;gap:8px;align-items:baseline}
.hp-temp{color:var(--gold)}
.ab-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
@media(max-width:500px){.ab-grid{grid-template-columns:repeat(3,1fr)}}
.ab-box{background:var(--panel-hi);border:1px solid var(--border);border-radius:4px;padding:8px 4px;text-align:center;cursor:pointer;min-height:80px}
.ab-box:hover{border-color:var(--accent)}
.ab-box .label{font-size:11px;color:var(--text-dim)}
.ab-box .mod{font-size:26px;font-weight:bold;line-height:1.1;color:var(--text)}
.ab-box .score{font-size:16px;font-weight:bold;color:var(--gold);cursor:text;border-bottom:1px dashed var(--border);padding:1px 6px;display:inline-block;margin-top:3px}
.ab-box .score:hover{border-color:var(--accent)}
.ab-box .save{font-size:11px;color:var(--text-dim);margin-top:4px}
.ab-box .save.prof{color:var(--good);font-weight:bold}
.skill-list{display:grid;grid-template-columns:1fr 1fr;gap:2px}
@media(max-width:500px){.skill-list{grid-template-columns:1fr}}
.skill-row{display:flex;align-items:center;gap:6px;padding:6px;border-radius:3px;cursor:pointer;min-height:32px}
.skill-row:hover{background:var(--panel-hi)}
.skill-row .prof-toggle{width:20px;height:20px;border:1px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;flex-shrink:0;background:var(--bg)}
.skill-row .prof-toggle.prof{background:var(--good);border-color:var(--good);color:#fff}
.skill-row .prof-toggle.expert{background:var(--gold);border-color:var(--gold);color:#fff}
.skill-row .prof-toggle.half{background:var(--text-dim);border-color:var(--text-dim);color:#fff}
.skill-row .skill-name{flex:1}
.skill-row .skill-ability{font-size:11px;color:var(--text-dim);width:18px}
.skill-row .skill-bonus{font-weight:bold;min-width:30px;text-align:right}
.attack-row{background:var(--panel-hi);border:1px solid var(--border);border-radius:4px;padding:8px;margin-bottom:6px;cursor:pointer}
.attack-row:hover{border-color:var(--accent)}
.attack-row .name{font-weight:bold}
.attack-row .stats{font-size:12px;color:var(--text-dim);display:flex;gap:12px;flex-wrap:wrap;margin-top:2px}
.attack-row .mastery{color:var(--gold)}
.slot-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-bottom:8px}
.slot-col{text-align:center}
.slot-col .level{font-size:10px;color:var(--text-dim)}
.slot-col .slots{display:flex;flex-direction:column-reverse;align-items:center;gap:2px;min-height:20px}
.slot-pip{width:16px;height:16px;border:1px solid var(--border);border-radius:2px;cursor:pointer;background:var(--bg)}
.slot-pip.full{background:var(--accent);border-color:var(--accent)}
.spell-list{max-height:400px;overflow-y:auto}
.spell-row{padding:6px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:6px}
.spell-row:hover{background:var(--panel-hi)}
.spell-row .lv{font-size:11px;color:var(--text-dim);width:24px;flex-shrink:0;text-align:center}
.spell-row .name{flex:1}
.spell-row .school{font-size:11px;color:var(--gold)}
.spell-row .conc{font-size:11px;color:var(--accent)}
.spell-row .mat-consumed{color:var(--bad);font-size:11px;font-weight:bold;margin-left:2px}
.spell-row .mat-valuable{color:var(--gold);font-size:11px;margin-left:2px}
.material-line{padding:8px 10px;border-radius:4px;margin:8px 0;font-size:12px;line-height:1.5}
.material-line.normal{background:var(--panel-hi);color:var(--text-dim)}
.material-line.valuable{background:rgba(200,160,50,.12);color:var(--gold);border-left:3px solid var(--gold)}
.material-line.consumed{background:rgba(200,50,50,.15);color:var(--accent);border-left:3px solid var(--accent);font-weight:bold}
.res-row{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--border)}
.res-row:last-child{border-bottom:none}
.res-row .label{flex:1}
.res-row .reset-tag{font-size:10px;color:var(--text-dim);padding:2px 6px;background:var(--panel-hi);border-radius:2px}
.res-row .pips{display:flex;gap:3px}
.res-row .pip{width:16px;height:16px;border:1px solid var(--border);border-radius:2px;cursor:pointer;background:var(--bg)}
.res-row .pip.full{background:var(--gold);border-color:var(--gold)}
.item-row{display:flex;gap:6px;padding:6px 4px;border-bottom:1px dashed var(--border);align-items:center}
.item-row:last-child{border:none}
.item-row .name{flex:1}
.item-row .qty,.item-row .weight{color:var(--text-dim);font-size:12px}
.wealth-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.coin-box{text-align:center;background:var(--panel-hi);border:1px solid var(--border);border-radius:3px;padding:4px}
.coin-box .label{font-size:10px;color:var(--text-dim)}
.coin-box input{width:100%;text-align:center}
.status-grid{display:flex;flex-wrap:wrap;gap:4px}
.status-tag{padding:4px 10px;background:var(--bad);color:#fff;border-radius:12px;font-size:12px;cursor:pointer}
.status-tag.add{background:var(--panel-hi);color:var(--text-dim);border:1px dashed var(--border)}
.status-tag.has-x{padding:0;display:inline-flex;align-items:center}
.status-tag.has-x .status-name{padding:4px 4px 4px 10px}
.status-tag.has-x .status-x{padding:4px 8px 4px 4px;opacity:.85;font-weight:bold}
.status-tag.has-x .status-x:hover{opacity:1}
/* === 可编辑值的提示 === */
.editable{cursor:pointer}
.editable:hover{color:var(--accent)}
.stat-box.editable:hover{border-color:var(--accent);background:var(--bg);color:inherit}
.stat-box.editable::after{content:'✎';position:absolute;top:3px;right:5px;font-size:11px;opacity:.7;color:var(--text-dim)}
.edit-icon{display:inline-block;font-size:14px;color:var(--text-dim);cursor:pointer;margin-left:2px;opacity:.65;vertical-align:middle;padding:8px 10px;line-height:1;border-radius:4px;-webkit-tap-highlight-color:transparent}
.edit-icon:hover,.edit-icon:active{opacity:1;color:var(--accent);background:rgba(127,127,127,0.18)}
.has-override{border-bottom:1px dotted var(--accent)}
.insp-toggle{padding:4px 12px;border-radius:4px;background:var(--panel-hi);border:1px solid var(--border);cursor:pointer;display:inline-block}
.insp-toggle.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.conc-active{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:4px;background:rgba(200,160,50,.18);border:1px solid var(--gold);color:var(--gold);font-size:13px}
.conc-active .name{font-weight:bold}
.conc-active button{padding:2px 7px;font-size:11px;min-height:24px}
.conc-empty{color:var(--text-dim)}
.buff-grid{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.buff-chip{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:4px;background:rgba(106,190,106,.15);border:1px solid var(--good);color:var(--good);font-size:12px;line-height:1.4}
.buff-chip.conc{background:rgba(200,160,50,.15);border-color:var(--gold);color:var(--gold)}
.buff-chip.from-other{background:rgba(100,160,220,.15);border-color:#5aa0d8;color:#7ab8e0}
.buff-chip.from-other.conc{background:rgba(180,140,220,.15);border-color:#b48cdc;color:#c8a8e0}
.buff-chip .name{font-weight:bold}
.buff-chip .meta{font-size:11px;opacity:.85}
.buff-chip button{padding:1px 7px;font-size:11px;min-height:22px;background:transparent;border:1px solid currentColor;color:inherit}
.buff-chip button:hover{background:currentColor;color:var(--bg);filter:none}
.buff-chip .x{cursor:pointer;padding:0 5px;border-radius:3px;font-size:13px;line-height:1;color:inherit;opacity:.7}
.buff-chip .x:hover{background:var(--bad);color:#fff;opacity:1}
.buff-empty{color:var(--text-dim)}
.buff-line{padding:6px 8px;background:var(--panel-hi);border:1px solid var(--border);border-radius:4px;margin:4px 0;display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text)}
.buff-line:hover{border-color:var(--accent)}
.buff-line.on{background:rgba(106,190,106,.12);border-color:var(--good);color:var(--good)}
.buff-line.on.conc{background:rgba(200,160,50,.12);border-color:var(--gold);color:var(--gold)}
.buff-line.oneshot{border-style:dashed}
.buff-line .check{width:18px;height:18px;border:1px solid currentColor;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:var(--bg)}
.buff-line.on .check{background:currentColor}
.buff-line.on .check::after{content:'\2713';color:var(--bg);font-weight:bold}
.buff-line .bn{flex:1;font-weight:bold}
.buff-line .info{font-size:11px;opacity:.75}
.death-saves{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.death-pip{width:18px;height:18px;border:1px solid var(--border);border-radius:50%;cursor:pointer;display:inline-block;margin:0 2px;vertical-align:middle}
.death-pip.success{background:var(--good);border-color:var(--good)}
.death-pip.fail{background:var(--bad);border-color:var(--bad)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:12px}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 30px var(--shadow)}
.modal h3{margin:0 0 10px;color:var(--accent)}
.modal-row{margin-bottom:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.modal-buttons{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
.roll-result{font-size:24px;text-align:center;padding:14px;background:var(--panel-hi);border-radius:4px;margin:10px 0}
.roll-result .total{color:var(--accent);font-weight:bold;font-size:32px}
.roll-result .nat20{color:var(--good)}
.roll-result .nat1{color:var(--bad)}
.roll-detail{font-size:12px;color:var(--text-dim);margin-top:6px}
.adv-toggle{display:flex;gap:4px;flex:1}
.adv-toggle button{flex:1}
.adv-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.history-list{max-height:400px;overflow-y:auto}
.history-item{padding:8px;border-bottom:1px solid var(--border);font-size:12px}
.history-item .label{color:var(--gold)}
.history-item .val{float:right;font-weight:bold;font-size:14px}
textarea.notes{width:100%;min-height:120px;resize:vertical}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}
details summary{cursor:pointer;padding:4px 0;color:var(--text-dim)}
details summary:hover{color:var(--accent)}
.features-list .feature{padding:8px 4px;border-bottom:1px solid var(--border)}
.features-list .feature:last-child{border:none}
.features-list .src{font-size:10px;color:var(--text-dim)}
.features-list .name{font-weight:bold;color:var(--gold)}
.features-list .desc{font-size:12px;color:var(--text-dim);margin-top:2px}
.features-list .feature.summonable{cursor:pointer}
.features-list .feature.summonable:hover{background:var(--panel-hi)}
.features-list .feature.summonable .name .summon-hint{color:var(--accent);font-size:11px;font-weight:normal;margin-left:4px}
.special-roll-row{padding:8px;border:1px solid var(--border);border-radius:4px;margin-bottom:8px;background:var(--panel-hi)}
.special-roll-row .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.special-roll-row .label{font-weight:bold;color:var(--gold);flex:1}
.special-roll-row .die-tag{font-size:11px;color:var(--text-dim);padding:2px 6px;background:var(--bg);border-radius:2px}
.special-roll-row button.roll-btn{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:bold}
.special-roll-row button.roll-btn:hover{filter:brightness(1.15)}
.special-roll-row .desc{font-size:12px;color:var(--text-dim);margin-top:6px}
.surge-result .range{color:var(--gold);font-weight:bold;font-size:14px;margin-bottom:6px}
.surge-result .effect{padding:10px;background:var(--panel-hi);border-radius:4px;line-height:1.55;margin-bottom:8px}
.surge-result .sub-roll{padding:8px;border-left:3px solid var(--accent);background:var(--bg);margin-top:8px}
.surge-result .sub-roll .sub-label{font-size:12px;color:var(--text-dim);margin-bottom:4px}
.surge-table-modal{max-height:70vh;overflow-y:auto}
.surge-table-modal table{width:100%;border-collapse:collapse;font-size:12px}
.surge-table-modal td{padding:5px 6px;border-bottom:1px solid var(--border);vertical-align:top}
.surge-table-modal tr.hit{background:rgba(200,160,50,.18)}
.surge-table-modal td.range{white-space:nowrap;color:var(--gold);font-weight:bold;width:60px}
.tab-bar{position:sticky;top:0;z-index:9;background:var(--panel);border-bottom:1px solid var(--border);display:flex;gap:2px;padding:4px 8px;overflow-x:auto;white-space:nowrap;scrollbar-width:thin}
.tab-bar.has-comps{position:sticky}
.tab-btn{padding:6px 12px;background:var(--panel-hi);border:1px solid var(--border);border-radius:4px 4px 0 0;cursor:pointer;font-size:13px;color:var(--text-dim);min-height:32px;display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
.tab-btn:hover{color:var(--text);background:var(--bg)}
.tab-btn.active{color:var(--gold);background:var(--bg);border-color:var(--gold);border-bottom-color:var(--bg);font-weight:bold}
.tab-btn .tag{font-size:10px;color:var(--text-dim);font-weight:normal}
.tab-btn.active .tag{color:var(--gold)}
.tab-btn .x{margin-left:2px;color:var(--text-dim);font-size:14px;line-height:1;padding:0 2px;border-radius:3px}
.tab-btn .x:hover{background:var(--bad);color:#fff}
.tab-btn.summon-add{color:var(--accent);border-color:var(--accent);border-style:dashed}
.tab-btn.summon-add:hover{background:var(--accent);color:#fff}
.summon-picker-group{margin-bottom:14px}
.summon-picker-group h4{margin:0 0 6px;font-size:13px;color:var(--gold)}
.summon-picker-group .opts{display:flex;flex-wrap:wrap;gap:6px}
.summon-picker-group button{font-size:13px}
.summon-picker-group .meta{font-size:11px;color:var(--text-dim);margin-bottom:6px}
.hidden{display:none!important}
</style>
</head>
<body data-theme="dark">

<header>
  <h1><span id="char-name" data-edit-name="1" title="点击改名" style="cursor:pointer;border-bottom:1px dashed var(--border)">悲灵</span> <span class="meta" id="char-meta"></span></h1>
  <div class="toolbar">
    <button id="btn-rest-short">短休</button>
    <button id="btn-rest-long">长休</button>
    <button id="btn-history">骰史</button>
    <button id="btn-dice-cmd">骰娘</button>
    <button id="btn-theme">主题</button>
  </div>
</header>

<div class="tab-bar hidden" id="tab-bar"></div>

<main>
  <section class="panel">
    <h2>战斗 <span class="sub" id="prof-display">熟练 +0</span></h2>
    <div class="combat-grid">
      <div class="hp-bar" id="hp-bar">
        <div class="hp-row">
          <div>
            <div style="font-size:11px;color:var(--text-dim);">HP</div>
            <div><span class="hp-num num"><span id="hp-cur">0</span>/<span id="hp-max">0</span></span> <span class="hp-temp" id="hp-temp"></span></div>
          </div>
          <div style="margin-left:auto;font-size:11px;color:var(--text-dim);">点击编辑/受伤治疗</div>
        </div>
        <div class="hp-bar-bg"><div class="hp-bar-fg" id="hp-bar-fg" style="width:100%"></div></div>
      </div>
      <div class="stat-box" data-roll="initiative"><div class="label">先攻 <span class="edit-icon" data-edit="init" title="改先攻杂项加值">✎</span></div><div class="val num" id="init-val">+0</div></div>
      <div class="stat-box editable" data-edit="ac" title="改基础 AC 与杂项加值"><div class="label">AC</div><div class="val num" id="ac-val">10</div></div>
      <div class="stat-box editable" data-edit="dc" title="改法术 DC 杂项加值"><div class="label">DC</div><div class="val num" id="dc-val">—</div></div>
      <div class="stat-box"><div class="label">速度</div><div class="val num editable" id="speed-val" data-edit="speed" title="改速度">30</div><div class="sub editable" id="size-val" data-edit="size" title="改体型">中型</div></div>
      <div class="stat-box" data-roll="perception"><div class="label">被动察觉</div><div class="val num" id="pp-val">10</div></div>
      <div class="stat-box"><div class="label">HD <span class="edit-icon" data-edit="hd" title="改 HD 当前/上限">✎</span></div><div class="val num"><span id="hd-cur">0</span>/<span id="hd-max">0</span></div><div class="sub" id="hd-size">d8</div></div>
    </div>
  </section>

  <section class="panel" data-main-only="1">
    <h2>状态</h2>

/* === 状态管理 === */
let char=null;
let displayChar=null;  /* 当前 tab 显示的实体（指向 char 主体或某个 companion） */
function activeChar(){return displayChar||char}
function isMainView(){return !displayChar||displayChar===char}
function switchTab(idx){
  char.meta=char.meta||{};
  const comps=char.companions||[];
  if(idx<0||!comps[idx]){
    displayChar=char;
    char.meta.viewIndex=-1;
  }else{
    displayChar=comps[idx];
    char.meta.viewIndex=idx;
  }
  saveChar();
  applyMainOnlyVisibility();
  render();
}
function applyMainOnlyVisibility(){
  const isMain=isMainView();
  document.querySelectorAll('[data-main-only]').forEach(el=>{
    el.classList.toggle('hidden',!isMain);
  });
}

function activateCompanion(idx){
  const c=(char.companions||[])[idx];
  if(!c)return;
  c.active=true;
  saveChar();
  switchTab(idx);
}

function deactivateCompanion(idx){
  const c=(char.companions||[])[idx];
  if(!c)return;
  if(c.type==='companion')return;  // 永久伴生不可解除
  if(!confirm(`确认取消"${c.name}"（${typeLabel(c.type)}）吗？\n该 tab 会消失，下次需要再从「+召唤」选择。`))return;
  c.active=false;
  pushHistory(`解除${typeLabel(c.type)}`,0,c.name);
  // 如果当前正显示这个，切回主体
  if(char.meta&&char.meta.viewIndex===idx){
    char.meta.viewIndex=-1;
    displayChar=char;
  }
  saveChar();
  applyMainOnlyVisibility();
  render();
}

/* sourceFilter 给定时只显示该 source 的 inactive companion；不给时显示全部 */
function showSummonPicker(sourceFilter){
  const comps=char.companions||[];
  let inactive=comps.map((c,i)=>({c,i})).filter(x=>!isCompanionActive(x.c));
  if(sourceFilter)inactive=inactive.filter(x=>x.c.source===sourceFilter);
  if(!inactive.length){
    if(sourceFilter)alert(`「${sourceFilter}」没有可选形态。\n车卡时让 Claude 把对应生物加进 JSON 后再试。`);
    else alert('没有可激活的形态/召唤。\n车卡时让 Claude 把可变形态/可召唤生物加进 JSON 后再试。');
    return;
  }
  // 按 source 分组
  const groups=new Map();
  for(const {c,i} of inactive){
    const src=c.source||'其它';
    if(!groups.has(src))groups.set(src,[]);
    groups.get(src).push({c,i});
  }
  const groupHTML=Array.from(groups.entries()).map(([src,arr])=>{
    const sample=arr[0].c;
    const meta=sample.type==='wildShape'?'变身（消耗 1 次荒野变形）':sample.type==='summon'?'召唤':'';
    return `<div class="summon-picker-group">
      <h4>${src}</h4>
      ${meta?`<div class="meta">${meta}</div>`:''}
      <div class="opts">${arr.map(x=>`<button data-activate="${x.i}">${x.c.name||'?'}</button>`).join('')}</div>
    </div>`;
  }).join('');
  const title=sourceFilter?`${sourceFilter} — 选择形态`:'选择变身 / 召唤';
  openModal(`<h3>${title}</h3>
    ${groupHTML}
    <div class="modal-buttons"><button onclick="closeModal()">关闭</button></div>`);
}
/* companion 默认 active：未显式指定 active 字段时，type=companion 视为永久伴生（active=true），其他默认 inactive */
function isCompanionActive(c){
  if(typeof c.active==='boolean')return c.active;
  return c.type==='companion';
}
function typeLabel(t){return t==='wildShape'?'变身':t==='companion'?'伴生':t==='summon'?'召唤':'伴生'}
/* 根据 source 名查 char.companions 里挂在该 source 下的 companion type，
   用于决定"召唤…"/"变形…"/"唤出…"提示文字。混合或未知 → "变形/召唤" */
function summonVerb(sourceName){
  const comps=(char.companions||[]).filter(c=>c.source===sourceName);
  if(!comps.length)return '变形/召唤';
  const types=new Set(comps.map(c=>c.type));
  if(types.size===1){
    const t=[...types][0];
    return t==='wildShape'?'变形':t==='summon'?'召唤':'唤出';
  }
  return '变形/召唤';
}

function renderTabBar(){
  const bar=document.getElementById('tab-bar');
  const comps=char.companions||[];
  // 隐藏条件：完全没有 companions
  if(!comps.length){bar.classList.add('hidden');bar.innerHTML='';return}
  bar.classList.remove('hidden');
  const idx=(char.meta&&typeof char.meta.viewIndex==='number')?char.meta.viewIndex:-1;
  const tabs=[];
  tabs.push(`<button class="tab-btn ${idx===-1?'active':''}" data-tab="-1">${char.meta.name||'本人'} <span class="tag">主体</span></button>`);
  comps.forEach((c,i)=>{
    if(!isCompanionActive(c))return;  // inactive 不显示
    const t=typeLabel(c.type);
    const closable=(c.type!=='companion');  // 永久伴生不能 ✕（避免误删；想删让玩家手动改 JSON）
    tabs.push(`<button class="tab-btn ${idx===i?'active':''}" data-tab="${i}">${c.name||'?'} <span class="tag">${t}</span>${closable?`<span class="x" data-deactivate="${i}" title="取消该${t}">✕</span>`:''}</button>`);
  });
  // 「+召唤/变形」按钮（如果有 inactive companion）。文字根据 inactive 的 type 决定
  const inactives=comps.filter(c=>!isCompanionActive(c));
  if(inactives.length){
    const inactiveTypes=new Set(inactives.map(c=>c.type));
    let label='+ 变形/召唤';
    if(inactiveTypes.size===1){
      const t=[...inactiveTypes][0];
      label=t==='wildShape'?'+ 变形':t==='summon'?'+ 召唤':'+ 唤出';
    }
    tabs.push(`<button class="tab-btn summon-add" id="btn-summon-add" title="选择一个形态/伴生">${label}</button>`);
  }
  bar.innerHTML=tabs.join('');
}
function getEmbeddedChar(){
  try{
    const txt=document.getElementById('character-data').textContent.trim();
    if(txt&&txt!=='{}')return JSON.parse(txt);
  }catch(e){console.warn('character-data parse failed',e)}
  return JSON.parse(JSON.stringify(DEFAULT_CHAR));
}
function ensureCharId(c){
  if(!c.meta)c.meta={};
  if(!c.meta.charId)c.meta.charId='char-'+Math.random().toString(36).slice(2,10);
  return c.meta.charId;
}
// 把 cur 数字字段转成 used 布尔数组（pip 独立 toggle）。兼容老数据。
function normalizeOne(c){
  const sc=c.spellcasting||{};
  const slots=sc.slots||{};
  for(const lv in slots){
    const s=slots[lv];
    if(Array.isArray(s.used))continue;
    const mx=s.max|0,cur=(s.cur==null?mx:s.cur)|0;
    const usedN=Math.max(0,mx-cur);
    s.used=Array(mx).fill(false);
    for(let i=0;i<usedN;i++){if(mx-1-i>=0)s.used[mx-1-i]=true}
    delete s.cur;
  }
  for(const r of c.classResources||[]){
    if(Array.isArray(r.used))continue;
    const mx=r.max|0,cur=(r.cur==null?mx:r.cur)|0;
    const usedN=Math.max(0,mx-cur);
    r.used=Array(mx).fill(false);
    for(let i=0;i<usedN;i++){if(mx-1-i>=0)r.used[mx-1-i]=true}
    delete r.cur;
  }
  const ds=c.combat&&c.combat.deathSaves;
  if(ds){
    for(const k of ['success','fail']){
      if(Array.isArray(ds[k]))continue;
      const n=ds[k]|0;
      ds[k]=[0,1,2].map(i=>i<n);
    }
  }
  // 兜底 buffs 数组（老卡 / 未填者）
  if(c.combat&&!Array.isArray(c.combat.buffs))c.combat.buffs=[];
}
function normalize(c){
  normalizeOne(c);
  for(const comp of c.companions||[])normalizeOne(comp);
  return c;
}
function loadChar(){
  const initial=getEmbeddedChar();
  const charId=ensureCharId(initial);
  let c=initial;
  try{
    const s=localStorage.getItem('dnd5e-char:'+charId);
    if(s)c=JSON.parse(s);
  }catch(e){}
  return normalize(c);
}
function saveChar(){
  try{localStorage.setItem('dnd5e-char:'+ensureCharId(char),JSON.stringify(char))}catch(e){}
}

/* === 计算 === */
function totalLevel(c){return (c&&c.meta&&Array.isArray(c.meta.classes))?c.meta.classes.reduce((s,x)=>s+(x.level||0),0):0}
function profBonus(c){
  // companion 没 meta.classes 时共享主体 PB
  const target=(c&&c.meta&&Array.isArray(c.meta.classes))?c:char;
  return RULES.proficiencyByLevel[totalLevel(target)]||2;
}
function classHdGroups(c){
  const map=new Map();
  for(const cls of c.meta.classes||[]){
    const hd=RULES.classes[cls.name]?.hd||8;
    if(!map.has(hd))map.set(hd,{hd,levels:0,names:[]});
    const g=map.get(hd);
    g.levels+=cls.level||0;
    g.names.push(cls.name);
  }
  return Array.from(map.values()).sort((a,b)=>b.hd-a.hd);
}
function hdSummary(c){
  const groups=classHdGroups(c);
  if(!groups.length)return 'd8';
  if(groups.length===1)return 'd'+groups[0].hd;
  return groups.map(g=>`d${g.hd}×${g.levels}`).join(' + ');
}
function abMod(s){return Math.floor((s-10)/2)}
function fmt(n){return(n>=0?'+':'')+n}
function saveBonus(c,ab){const a=c.abilities[ab];let b=abMod(a.score);if(a.saveProf)b+=profBonus(c);return b+(a.saveBonus||0)}
function skillBonus(c,sk){
  const s=RULES.skills.find(x=>x.key===sk);
  const d=c.skills[sk]||{prof:'none',bonus:0};
  let b=abMod(c.abilities[s.ability].score);
  const pb=profBonus(c);
  if(d.prof==='prof')b+=pb;
  else if(d.prof==='expert')b+=pb*2;
  else if(d.prof==='half')b+=Math.floor(pb/2);
  else if(c.skills.jackOfAllTrades)b+=Math.floor(pb/2);
  return b+(d.bonus||0)+(c.skills.globalBonus||0)
}
/* === BUFF helpers ===
   buffs 仅作用于主体 char（companion 不享）。
   modifiers 字段约定见 SKILL.md。
*/
function activeBuffs(c){
  if(!c||c!==char)return [];  // companion / wildShape 不享主体 buff
  return (char.combat&&char.combat.buffs)||[];
}
function genBuffId(){return 'b-'+Math.random().toString(36).slice(2,9)}
function parseAcOverride(c,formula){
  // 支持 '13+dex' / '10+wis' / '13+dex+wis' / 纯数字
  if(typeof formula==='number')return formula;
  const s=String(formula).replace(/\s/g,'');
  const m=s.match(/^(\d+)((?:[+-][a-z]{3})*)$/i);
  if(!m)return null;
  let v=+m[1];
  const rest=m[2]||'';
  const parts=rest.match(/[+-][a-z]{3}/gi)||[];
  for(const p of parts){
    const sign=p[0]==='-'?-1:1;
    const ab=p.slice(1).toLowerCase();
    const a=c.abilities[ab];
    if(!a)return null;
    v+=sign*abMod(a.score);
  }
  return v;
}
function addBuff(b){
  if(!char.combat.buffs)char.combat.buffs=[];
  if(!b.id)b.id=genBuffId();
  char.combat.buffs.push(b);
  saveChar();
}
function removeBuff(id){
  if(!char.combat.buffs)return;
  char.combat.buffs=char.combat.buffs.filter(b=>b.id!==id);
  saveChar();
}
/* concentration 释放/中断时，清掉所有挂在该 spellName 上的 conc buff */
function clearBuffsForConc(spellName){
  if(!char.combat.buffs)return;
  const before=char.combat.buffs.length;
  char.combat.buffs=char.combat.buffs.filter(b=>!(b.conc&&b.spellName===spellName));
  return before!==char.combat.buffs.length;
}
/* 给定 roll context（kind/ability），返回适用 buff modifiers 列表。
   kind: 'attack' | 'save' | 'check' | 'skill' | 'init'  （skill/init 当作 check 处理）
   ability: 'str'|'dex'|...（save/check 才有意义）*/
function applicableBuffs(ctx){
  const buffs=activeBuffs(char);
  const kind=ctx&&ctx.kind;
  const ab=ctx&&ctx.ability;
  const checkLike=k=>k==='check'||k==='skill'||k==='init';
  const out=[];
  for(const b of buffs){
    const m=b.modifiers||{};
    const lines=[];
    // 平加值
    if(kind==='attack'&&m.attackBonus){lines.push({kind:'flat',label:`+${m.attackBonus} 命中`,delta:m.attackBonus,continuous:true})}
    if(kind==='save'&&m.saveBonus){
      const sb=m.saveBonus;
      const v=(typeof sb==='number')?sb:(sb&&(sb.all||sb[ab])||0);
      if(v)lines.push({kind:'flat',label:`+${v} 豁免`,delta:v,continuous:true});
    }
    if(checkLike(kind)&&m.checkBonus){
      const cb=m.checkBonus;
      const v=(typeof cb==='number')?cb:(cb&&(cb.all||cb[ab])||0);
      if(v)lines.push({kind:'flat',label:`+${v} 检定`,delta:v,continuous:true});
    }
    // 持续加骰
    if(kind==='attack'&&m.attackDice)lines.push({kind:'dice',die:m.attackDice,label:`+${m.attackDice} 命中`,continuous:true});
    if(kind==='save'&&m.saveDice)lines.push({kind:'dice',die:m.saveDice,label:`+${m.saveDice} 豁免`,continuous:true});
    if(checkLike(kind)&&m.checkDice)lines.push({kind:'dice',die:m.checkDice,label:`+${m.checkDice} 检定`,continuous:true});
    // 一次性骰
    if(m.oneShot){
      const os=m.oneShot;
      const ap=os.applies||['attack','save','check'];
      const matchOneShot=
        (kind==='attack'&&ap.includes('attack'))||
        (kind==='save'&&ap.includes('save'))||
        (checkLike(kind)&&ap.includes('check'));
      if(matchOneShot)lines.push({kind:'oneShot',die:os.die||'d4',label:`+${os.die||'d4'} 一次性`,continuous:false});
    }
    if(lines.length)out.push({buff:b,lines});
  }
  return out;
}
function ac(c){
  let base=c.combat.acBase;
  // buff acOverride 优先：覆盖 acBase（仅主体享）
  if(c===char){
    for(const b of activeBuffs(c)){
      const ov=b.modifiers&&b.modifiers.acOverride;
      if(ov!=null){
        const v=parseAcOverride(c,ov);
        if(v!=null){base=v;break}
      }
    }
  }
  let a=base+(c.combat.acBonus||0);
  const sh=c.equipment&&c.equipment.shield;
  if(sh&&sh.equipped&&sh.ac)a+=sh.ac;
  // buff acBonus 累加
  if(c===char){
    for(const b of activeBuffs(c)){
      const ab=b.modifiers&&b.modifiers.acBonus;
      if(ab)a+=ab;
    }
  }
  return a;
}
function spellDC(c){const sa=c.spellcasting&&c.spellcasting.castingAbility;if(!sa)return null;return 8+profBonus(c)+abMod(c.abilities[sa].score)+(c.spellcasting.extraDcBonus||0)}
function spellAttack(c){const sa=c.spellcasting&&c.spellcasting.castingAbility;if(!sa)return null;return profBonus(c)+abMod(c.abilities[sa].score)+(c.spellcasting.extraAttackBonus||0)}
function passivePerception(c){return 10+skillBonus(c,'perception')}
function initiative(c){return abMod(c.abilities.dex.score)+(c.combat.initBonus||0)}
function totalGP(c){const w=c.wealth;return Math.round((w.cp/100+w.sp/10+w.ep/2+w.gp+w.pp*10)*100)/100}
function totalWeight(c){let w=0;const a=c.equipment.armor;if(a&&a.weight)w+=a.weight;const sh=c.equipment.shield;if(sh&&sh.weight)w+=sh.weight;for(const it of c.equipment.items||[])w+=(it.weight||0)*(it.qty||1);return w}
function carryStatus(c){const w=totalWeight(c),s=c.abilities.str.score;if(w<=s*5)return{label:'轻载',color:'var(--good)'};if(w<=s*10)return{label:'重载',color:'var(--gold)'};if(w<=s*15)return{label:'超载',color:'var(--bad)'};return{label:'超重',color:'var(--bad)'}}

/* === 投骰原子 === */
function rollDie(s){return Math.floor(Math.random()*s)+1}
function rollDice(n,s){const r=[];for(let i=0;i<n;i++)r.push(rollDie(s));return{rolls:r,total:r.reduce((a,b)=>a+b,0)}}
function parseDice(e){const m=e.replace(/\s/g,'').match(/^(\d+)d(\d+)([+-]\d+)?$/i);if(!m)return null;return{n:+m[1],sides:+m[2],mod:m[3]?+m[3]:0}}
/* 表达式语法：
     1d4+1            单组骰
     8d6 / 2d8        无 mod 单组骰
     3·(1d4+1)        重复组：3 次 (1d4+1)，逐组求和（魔法飞弹/灼热射线等多投独立伤害的法术）
     3·2d6            等价 3·(2d6)（括号可省）
   分隔符 · / × / * 等价。 */
function rollExpr(e){
  const raw=e;
  e=String(e).replace(/\s/g,'');
  const repeat=e.match(/^(\d+)[·×*]\(?([^()]+)\)?$/);
  if(repeat){
    const n=+repeat[1];
    const inner=parseDice(repeat[2]);
    if(!inner)return null;
    let total=0;
    const allRolls=[];
    const groups=[];
    for(let i=0;i<n;i++){
      const r=rollDice(inner.n,inner.sides);
      const groupTotal=r.total+inner.mod;
      total+=groupTotal;
      allRolls.push(...r.rolls);
      groups.push(`(${r.rolls.join('+')}${inner.mod?fmt(inner.mod):''}=${groupTotal})`);
    }
    return {rolls:allRolls,total,mod:0,expr:raw,detail:groups.join(' + ')};
  }
  const p=parseDice(e);
  if(!p)return null;
  const r=rollDice(p.n,p.sides);
  return {...r,mod:p.mod,total:r.total+p.mod,expr:raw};
}
/* 升环伤害计算：
     spell.upcast = { dice: '1d6', perLevel: 1 }       → '8d6' 升 N 环 → '(8+N)d6'
     spell.upcast = { repeat: '1d4+1', perLevel: 1 }   → '3·(1d4+1)' 升 N 环 → '(3+N)·(1d4+1)'
   若没 upcast 字段，返回原 damage（不变）。castLvl 可大于等于 spell.lvl。 */
function getUpcastDamage(spell,castLvl){
  const baseDmg=spell.damage||'';
  const baseLvl=spell.lvl||0;
  const extra=Math.max(0,castLvl-baseLvl);
  if(!extra||!spell.upcast)return baseDmg;
  const u=spell.upcast,per=u.perLevel||1;
  if(u.dice){
    const baseM=baseDmg.replace(/\s/g,'').match(/^(\d+)d(\d+)([+-]\d+)?$/);
    const upM=String(u.dice).replace(/\s/g,'').match(/^(\d*)d(\d+)$/);
    if(baseM&&upM&&baseM[2]===upM[2]){
      const newN=+baseM[1]+extra*per*(+upM[1]||1);
      return newN+'d'+baseM[2]+(baseM[3]||'');
    }
  }
  if(u.repeat){
    const baseR=baseDmg.replace(/\s/g,'').match(/^(\d+)[·×*]\(?([^()]+)\)?$/);
    if(baseR&&baseR[2]===String(u.repeat).replace(/\s/g,'')){
      const newN=+baseR[1]+extra*per;
      return `${newN}·(${baseR[2]})`;
    }
  }
  return baseDmg;
}
function rollD20WithAdv(m){const a=rollDie(20),b=rollDie(20);if(m==='adv')return{chosen:Math.max(a,b),both:[a,b],mode:m};if(m==='dis')return{chosen:Math.min(a,b),both:[a,b],mode:m};return{chosen:a,both:[a],mode:m}}
function pushHistory(label,total,detail){char.rollHistory=char.rollHistory||[];char.rollHistory.unshift({label,total,detail,t:Date.now()});char.rollHistory=char.rollHistory.slice(0,30);saveChar()}

/* === 模态框 === */
function openModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-overlay').classList.remove('hidden')}
function closeModal(){document.getElementById('modal-overlay').classList.add('hidden')}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')closeModal()});

/* === 渲染 ===
   多数 render 函数读 activeChar()——主体或 companion，由当前 tab 决定。
   主体专属（marked data-main-only / 始终读 char）：
     状态、法术、装备、特殊投骰；这些 panel 切到 companion 时整体 hide。
   渲染入口：
     1. renderTabBar（决定 displayChar 当前指向）
     2. applyMainOnlyVisibility（隐藏不该出现的 panel）
     3. 各 panel 渲染——主体 panel 直读 char，entity-aware panel 读 activeChar */
function render(){
  // 没 displayChar 默认主体
  if(!displayChar)displayChar=char;
  renderTabBar();
  applyMainOnlyVisibility();
  renderHeader();
  renderCombat();
  if(isMainView())renderStatus();

function renderCombat(){
  const c=activeChar();
  const isMain=isMainView();
  document.getElementById('hp-cur').textContent=c.combat.hpCur;
  document.getElementById('hp-max').textContent=c.combat.hpMax;
  document.getElementById('hp-temp').textContent=c.combat.hpTemp?`(+${c.combat.hpTemp})`:'';
  const pct=c.combat.hpMax>0?Math.max(0,c.combat.hpCur/c.combat.hpMax*100):0;
  const bar=document.getElementById('hp-bar-fg');
  bar.style.width=pct+'%';
  bar.className='hp-bar-fg'+(pct<25?' crit':pct<50?' low':'');
  const initEl=document.getElementById('init-val');
  initEl.textContent=fmt(initiative(c));
  initEl.classList.toggle('has-override',!!(c.combat.initBonus));
  const acEl=document.getElementById('ac-val');
  acEl.textContent=ac(c);
  acEl.classList.toggle('has-override',!!(c.combat.acBonus));
  // DC / HD 主体专属，companion 视图显示 —
  if(isMain){
    const dc=spellDC(char);
    const dcEl=document.getElementById('dc-val');
    dcEl.textContent=dc!=null?dc:'—';
    dcEl.classList.toggle('has-override',!!(char.spellcasting&&char.spellcasting.extraDcBonus));
    document.getElementById('hd-cur').textContent=char.combat.hdCur;
    document.getElementById('hd-max').textContent=char.combat.hdMax;
    // 在 hd-cur 和 hd-max 之间的 "/" 是模板里硬写的；这里把它显示出来
    const hdMaxEl=document.getElementById('hd-max');
    if(hdMaxEl.previousSibling&&hdMaxEl.previousSibling.nodeType===3)hdMaxEl.previousSibling.textContent='/';
    document.getElementById('hd-size').textContent=hdSummary(char);
  }else{
    const dcEl=document.getElementById('dc-val');
    dcEl.textContent='—';
    dcEl.classList.remove('has-override');
    document.getElementById('hd-cur').textContent='—';
    document.getElementById('hd-max').textContent='';
    const hdMaxEl=document.getElementById('hd-max');
    if(hdMaxEl.previousSibling&&hdMaxEl.previousSibling.nodeType===3)hdMaxEl.previousSibling.textContent='';
    document.getElementById('hd-size').textContent='主体';
  }
  document.getElementById('speed-val').textContent=c.combat.speed;
  document.getElementById('size-val').textContent=c.combat.size;
  document.getElementById('pp-val').textContent=passivePerception(c);
}

}
/* 把 modifiers 摘要成短字符串，给 chip 当 meta */
function summarizeMods(m){
  const out=[];
  if(m.acOverride!=null)out.push(`AC=${m.acOverride}`);
  if(m.acBonus)out.push(`AC+${m.acBonus}`);
  if(m.attackBonus)out.push(`命+${m.attackBonus}`);
  if(m.attackDice)out.push(`命+${m.attackDice}`);
  if(m.saveBonus){
    const sb=m.saveBonus;
    if(typeof sb==='number')out.push(`豁+${sb}`);
    else if(sb.all)out.push(`豁+${sb.all}`);
    else out.push('豁(部分)');
  }
  if(m.saveDice)out.push(`豁+${m.saveDice}`);
  if(m.checkBonus){
    const cb=m.checkBonus;
    if(typeof cb==='number')out.push(`检+${cb}`);
    else if(cb.all)out.push(`检+${cb.all}`);
    else out.push('检(部分)');
  }
  if(m.checkDice)out.push(`检+${m.checkDice}`);
  if(m.oneShot){
    const ap=(m.oneShot.applies||['attack','save','check']).map(x=>x==='attack'?'命':x==='save'?'豁':'检').join('/');
    out.push(`${ap}+${m.oneShot.die||'d4'}(一次)`);
  }
  return out.join(' ');
}

/* === 法术材料 helper ===
   spell.material 可以是字符串（描述）或对象 {desc, gp, consumed, focusable}。
   分类：
   - consumed=true       → 消耗类（红色高亮 + 施放前 confirm）
   - gp>0 && !consumed   → 高价值类（金色高亮，不消耗但 DM 会管这颗珍珠还在不在）
   - 其余                → 普通材料（灰色小字，可被法器替代）
*/
function spellMaterial(spell){
  const m=spell.material;
  if(!m)return null;
  if(typeof m==='string')return {desc:m,gp:0,consumed:false,focusable:true,kind:'normal'};
  const consumed=!!m.consumed;
  const gp=+m.gp||0;
  const focusable=m.focusable!==false&&!consumed&&!gp;
  const kind=consumed?'consumed':(gp>0?'valuable':'normal');
  return {desc:m.desc||'',gp,consumed,focusable,kind};
}

function renderSpells(){
  const sc=char.spellcasting;
  const meta=document.getElementById('spell-meta');
  const sg=document.getElementById('slot-grid');
  const list=document.getElementById('spell-list');
  if(!sc||!sc.castingAbility){meta.textContent='此角色无施法能力';sg.innerHTML='';list.innerHTML='';return}
  const dcOv=(sc.extraDcBonus||0)!==0?' has-override':'';
  const atkOv=(sc.extraAttackBonus||0)!==0?' has-override':'';
  meta.innerHTML=`DC <span class="editable${dcOv}" data-edit="spellDc" title="改法术 DC 加值">${spellDC(char)}</span> · 攻 <span class="editable${atkOv}" data-edit="spellAtk" title="改法术攻击加值">${fmt(spellAttack(char))}</span> (${RULES.abilityNames[sc.castingAbility]})`;
  sg.innerHTML=[1,2,3,4,5,6,7,8,9].map(lv=>{
    const s=sc.slots[lv]||{used:[],max:0};
    if(s.max===0)return `<div class="slot-col"><div class="level">${lv}</div><div class="slots" style="opacity:.3">—</div></div>`;
    if(!Array.isArray(s.used))s.used=Array(s.max).fill(false);
    const pips=[];
    for(let i=0;i<s.max;i++)pips.push(`<div class="slot-pip ${s.used[i]?'':'full'}" data-slot="${lv}" data-i="${i}"></div>`);
    const remaining=s.used.filter(x=>!x).length;
    return `<div class="slot-col"><div class="level">${lv}环</div><div class="slots">${pips.join('')}</div><div class="level num">${remaining}/${s.max}</div></div>`;
  }).join('');
  const all=[];
  for(const c of sc.cantrips||[])all.push({...c,lvl:0});
  for(const sp of sc.spells||[])all.push(sp);
  all.sort((a,b)=>a.lvl-b.lvl||a.name.localeCompare(b.name,'zh'));
  list.innerHTML=all.map((sp,i)=>{
    const mat=spellMaterial(sp);
    let matBadge='';
    if(mat){
      if(mat.kind==='consumed')matBadge=`<span class="mat-consumed" title="消耗：${mat.desc}">⚠${mat.gp?mat.gp+'gp':''}</span>`;
      else if(mat.kind==='valuable')matBadge=`<span class="mat-valuable" title="${mat.desc}">💎${mat.gp}gp</span>`;
    }
    return `<div class="spell-row" data-spell-i="${i}">
    <span class="lv">${sp.lvl===0?'戏':sp.lvl+'环'}</span>
    <span class="name">${sp.name}${matBadge}</span>
    <span class="school">${sp.school||''}</span>
    ${sp.conc?'<span class="conc">[专]</span>':''}
    ${sp.ritual?'<span class="conc">[仪]</span>':''}
  </div>`;
  }).join('')||'<div style="color:var(--text-dim)">无法术</div>';
  list._allSpells=all;
}

        <button data-special-table="${i}">查表</button>
      </div>
      ${desc}
    </div>`;
  }).join('');
}

function findSurgeRow(table,roll){
  for(const row of table||[]){if(roll>=row.min&&roll<=row.max)return row}
  return null;
}

function rollSubOption(sub){
  if(!sub)return null;
  const m=String(sub.die||'d4').match(/^d(\d+)$/i);
  if(!m)return null;
  const sides=+m[1];
  const r=rollDie(sides);
  const opts=sub.options||[];
  const text=opts[r-1]||'(表外)';
  return {die:`d${sides}`,roll:r,text};
}

function showSpecialRollResult(spec,roll,row){
  const die=spec.die||'d100';
  const label=spec.label||'特殊投骰';
  let body=`<h3>${label}</h3>
    <div class="surge-result">
      <div class="roll-result"><div>${die} 结果</div><div class="total">${roll}</div></div>`;
  if(!row){
    body+=`<div class="effect">未在表上找到匹配区间。</div>`;
  }else{
    body+=`<div class="range">区间 ${row.min}–${row.max}</div>
      <div class="effect">${row.effect||'(无文字)'}</div>`;
    if(row.subRoll){
      const sub=rollSubOption(row.subRoll);
      if(sub){
        body+=`<div class="sub-roll">
          <div class="sub-label">附加 ${sub.die} = <strong style="color:var(--accent)">${sub.roll}</strong></div>
          <div>${sub.text}</div>
        </div>`;
        pushHistory(`${label} ${die}+${sub.die}`,roll,`${roll} → ${row.min}-${row.max}；${sub.die}=${sub.roll}：${sub.text}`);
      }else{
        pushHistory(`${label} ${die}`,roll,`${roll} → ${row.min}-${row.max}：${(row.effect||'').slice(0,80)}`);
      }
    }else{
      pushHistory(`${label} ${die}`,roll,`${roll} → ${row.min}-${row.max}：${(row.effect||'').slice(0,80)}`);
    }
  }
  body+=`</div>
    <div class="modal-buttons">
      <button onclick="closeModal()">关闭</button>
    </div>`;
  openModal(body);
}

function triggerSpecialRoll(i){
  const spec=(char.specialRolls||[])[i];
  if(!spec)return;
  const m=String(spec.die||'d100').match(/^d(\d+)$/i);
  const sides=m?+m[1]:100;
  const roll=rollDie(sides);
  const row=findSurgeRow(spec.table,roll);
  showSpecialRollResult(spec,roll,row);
}

function showSpecialRollTable(i){
  const spec=(char.specialRolls||[])[i];

  const die=spec.die||'d100';

  </tr>`).join('');
  openModal(`<h3>${spec.label||'特殊投骰'}（${die} 全表）</h3>
    <div class="surge-table-modal"><table>${rows||'<tr><td>(空表)</td></tr>'}</table></div>

function renderFeatures(){
  const c=activeChar();
  const list=document.getElementById('features-list');
  list.innerHTML=(c.features||[]).map(f=>{
    const cls=f.summonSource?'feature summonable':'feature';
    const dataAttr=f.summonSource?` data-feature-summon="${f.summonSource}"`:'';
    const hint=f.summonSource?`<span class="summon-hint">▸ ${summonVerb(f.summonSource)}…</span>`:'';
    return `<div class="${cls}"${dataAttr}>
    <div class="src">[${f.source||''}]</div>
    <div class="name">${f.name||''}${hint}</div>
    <div class="desc">${f.desc||''}</div>
  </div>`;
  }).join('')||'<div style="color:var(--text-dim)">无</div>';
}

function renderNotes(){
  const c=activeChar();
  // companion 用 c.notes（直接顶层字段），主体用 c.meta.notes
  const txt=isMainView()?(char.meta&&char.meta.notes||''):(c.notes||'');
  document.getElementById('notes-input').value=txt;
}

/* === 投骰对话框 ===
   ctx：{kind:'attack'|'save'|'check'|'skill'|'init', ability?:'str'|...}
   未传 ctx 时不应用 buff（保留旧调用兼容）。 */
let rollCtx=null;
/* 把适用 buff 渲成可切换的 line 列表；返回 {html, flat, selected, applyAndConsume} */
function buildBuffPicker(ctx){
  const apps=applicableBuffs(ctx);
  const flat=[];
  apps.forEach(a=>a.lines.forEach(l=>flat.push({buff:a.buff,line:l})));
  // 默认：持续 ON、一次性 OFF
  const selected=flat.map(f=>!!f.line.continuous);
  const html=flat.length?`<div style="margin:8px 0 4px;font-size:12px;color:var(--text-dim)">适用增益（点击切换）：</div>`+
    flat.map((f,i)=>{
      const oneShot=f.line.kind==='oneShot';
      const conc=!!f.buff.conc;
      return `<div class="buff-line ${selected[i]?'on':''} ${conc?'conc':''} ${oneShot?'oneshot':''}" data-buff-toggle="${i}">
        <span class="check"></span>
        <span class="bn">${f.buff.name}</span>
        <span class="info">${f.line.label}${oneShot?' · 用后清除':''}${conc?' · 专注':''}</span>
      </div>`;
    }).join(''):'';
  function bind(){
    document.querySelectorAll('[data-buff-toggle]').forEach(el=>{
      el.addEventListener('click',()=>{
        const i=parseInt(el.dataset.buffToggle);
        selected[i]=!selected[i];
        el.classList.toggle('on',selected[i]);
      });
    });
  }
  /* 按当前 selected 投骰 / 加值；返回 {bonus,details,consumeIds} */
  function compute(){
    let bonus=0;const details=[];const consumeIds=new Set();
    flat.forEach((f,i)=>{
      if(!selected[i])return;
      if(f.line.kind==='flat'){
        bonus+=f.line.delta;
        details.push(`${f.buff.name}(+${f.line.delta})`);
      }else if(f.line.kind==='dice'||f.line.kind==='oneShot'){
        const m=String(f.line.die||'d4').match(/^d(\d+)$/i);
        if(!m)return;
        const sides=+m[1];const v=rollDie(sides);
        bonus+=v;
        details.push(`${f.buff.name}(${f.line.die}=${v})`);
        if(f.line.kind==='oneShot')consumeIds.add(f.buff.id);
      }
    });
    return {bonus,details,consumeIds};
  }
  /* 调用方拿到 result.consumeIds 后调此函数清掉 */
  function consume(consumeIds){
    if(!consumeIds||!consumeIds.size)return;
    const concSpellsToRelease=[];
    char.combat.buffs=(char.combat.buffs||[]).filter(b=>{
      if(consumeIds.has(b.id)){
        if(b.conc&&b.spellName)concSpellsToRelease.push(b.spellName);
        return false;
      }
      return true;
    });
    for(const sp of concSpellsToRelease){
      const cur=char.combat.concentration;
      if(cur&&cur.spellName===sp){
        char.combat.concentration=null;
        pushHistory('释放专注',0,`${sp} 一次性效果触发后结束`);
      }
    }
    saveChar();renderStatus();renderCombat();
  }
  return {html,bind,compute,consume,hasAny:flat.length>0};
}
function showRollDialog(label,baseBonus,ctx){
  rollCtx={label,baseBonus,mode:'normal',extra:0};
  const picker=buildBuffPicker(ctx||{});
  openModal(`<h3>${label}</h3>
    <div class="modal-row"><span>基础加值：<strong class="num" id="rb">${fmt(baseBonus)}</strong></span>
      <span style="margin-left:auto">微调：</span>
      <button data-extra="-1">-1</button>
      <span class="num" id="re" style="min-width:24px;text-align:center">+0</span>
      <button data-extra="+1">+1</button>
    </div>
    <div class="modal-row"><span>模式：</span>
      <div class="adv-toggle">
        <button class="active" data-mode="normal">正常</button>
        <button data-mode="adv">优势</button>
        <button data-mode="dis">劣势</button>
      </div>
    </div>
    ${picker.html}
    <div id="roll-result"></div>
    <div class="modal-buttons">
      <button onclick="closeModal()">取消</button>
      <button class="primary" id="btn-do-roll">投！</button>
    </div>`);
  picker.bind();
  document.querySelectorAll('[data-extra]').forEach(b=>b.addEventListener('click',()=>{
    rollCtx.extra+=parseInt(b.dataset.extra);
    document.getElementById('re').textContent=fmt(rollCtx.extra);
    document.getElementById('rb').textContent=fmt(rollCtx.baseBonus+rollCtx.extra);
  }));
  document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{
    rollCtx.mode=b.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
  }));
  document.getElementById('btn-do-roll').addEventListener('click',()=>{
    const r=rollD20WithAdv(rollCtx.mode);
    const buff=picker.compute();
    const total=r.chosen+rollCtx.baseBonus+rollCtx.extra+buff.bonus;
    const cls=r.chosen===20?'nat20':r.chosen===1?'nat1':'';
    const buffStr=buff.details.length?' '+buff.details.join(' '):'';
    const detail=`D20: ${r.both.map(d=>d===r.chosen?`<strong class="${cls}">${d}</strong>`:`<s>${d}</s>`).join(' / ')} ${rollCtx.mode==='adv'?'(优)':rollCtx.mode==='dis'?'(劣)':''} ${fmt(rollCtx.baseBonus+rollCtx.extra)}${buffStr}`;
    document.getElementById('roll-result').innerHTML=`<div class="roll-result"><div class="total">${total}</div><div class="roll-detail">${detail}</div></div>`;
    pushHistory(rollCtx.label,total,detail.replace(/<[^>]+>/g,''));
    picker.consume(buff.consumeIds);
  });
}

/* === 攻击对话框 === */
function showAttackDialog(idx){
  const c=activeChar();
  const a=c.attacks[idx];
  if(!a)return;
  const m=abMod((c.abilities[a.ability]||{score:10}).score);
  const atkBonus=m+profBonus(char)+(a.attackBonus||0);
  const dmgMod=m+(a.damageBonus||0);
  let amode='normal';
  const picker=buildBuffPicker({kind:'attack',ability:a.ability});
  openModal(`<h3>攻击：${a.name}</h3>
    <div class="modal-row" style="font-size:13px">命中 <strong>${fmt(atkBonus)}</strong> ｜ 伤害 <strong>${a.damage}${dmgMod?fmt(dmgMod):''}</strong> ${a.damageType}</div>
    ${a.mastery?`<div class="modal-row" style="font-size:12px;color:var(--gold);background:var(--panel-hi);padding:6px;border-radius:3px"><strong>精通【${a.mastery}】</strong>：${RULES.weaponMastery[a.mastery]||''}</div>`:''}
    <div class="modal-row"><span>模式：</span>
      <div class="adv-toggle">
        <button class="active" data-amode="normal">正常</button>
        <button data-amode="adv">优势</button>
        <button data-amode="dis">劣势</button>
      </div>
    </div>
    ${picker.html}
    <div id="atk-result"></div>
    <div class="modal-buttons">
      <button onclick="closeModal()">关闭</button>
      <button class="primary" id="btn-atk">投攻击</button>
      <button id="btn-dmg">投伤害</button>
      <button id="btn-crit">暴击伤害</button>
    </div>`);
  picker.bind();
  document.querySelectorAll('[data-amode]').forEach(b=>b.addEventListener('click',()=>{
    amode=b.dataset.amode;
    document.querySelectorAll('[data-amode]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
  }));
  document.getElementById('btn-atk').addEventListener('click',()=>{
    const r=rollD20WithAdv(amode);
    const buff=picker.compute();
    const total=r.chosen+atkBonus+buff.bonus;
    const cls=r.chosen===20?'nat20':r.chosen===1?'nat1':'';
    const buffStr=buff.details.length?' '+buff.details.join(' '):'';
    const detail=`D20: ${r.both.map(d=>d===r.chosen?`<strong class="${cls}">${d}</strong>`:`<s>${d}</s>`).join(' / ')} ${fmt(atkBonus)}${buffStr}${r.chosen===20?' 暴击!':''}`;
    document.getElementById('atk-result').innerHTML=`<div class="roll-result"><div class="total">${total}</div><div class="roll-detail">${detail}</div></div>`;
    pushHistory(`攻击-${a.name}`,total,detail.replace(/<[^>]+>/g,''));
    picker.consume(buff.consumeIds);
  });
  document.getElementById('btn-dmg').addEventListener('click',()=>{
    const r=rollExpr(a.damage);
    if(!r){alert('伤害骰解析失败：'+a.damage);return}
    const total=r.total+dmgMod;
    const detail=`${a.damage}: [${r.rolls.join(',')}] ${dmgMod?fmt(dmgMod):''} = ${total} ${a.damageType}`;
    document.getElementById('atk-result').innerHTML=`<div class="roll-result"><div class="total">${total}</div><div class="roll-detail">${detail}</div></div>`;
    pushHistory(`伤害-${a.name}`,total,detail);
  });
  document.getElementById('btn-crit').addEventListener('click',()=>{
    const r1=rollExpr(a.damage),r2=rollExpr(a.damage);
    if(!r1||!r2){alert('伤害骰解析失败');return}
    const total=r1.total+r2.total+dmgMod;
    const detail=`暴击 ${a.damage}×2: [${r1.rolls.join(',')}]+[${r2.rolls.join(',')}] ${dmgMod?fmt(dmgMod):''} = ${total} ${a.damageType}`;
    document.getElementById('atk-result').innerHTML=`<div class="roll-result"><div class="total">${total}</div><div class="roll-detail">${detail}</div></div>`;
    pushHistory(`暴击-${a.name}`,total,detail);
  });
}

/* === 法术对话框 === */
function showSpellDialog(spell){
  const sc=char.spellcasting;
  const isCantrip=spell.lvl===0;
  let slotOpts='';
  if(!isCantrip){
    const opts=[];
    for(let lv=spell.lvl;lv<=9;lv++){
      const s=sc.slots[lv]||{max:0,used:[]};
      if(s.max===0)continue;
      const remaining=(s.used||[]).filter(x=>!x).length;
      opts.push(`<option value="${lv}" ${lv===spell.lvl?'selected':''} ${remaining===0?'disabled':''}>${lv}环 (${remaining}/${s.max})${lv>spell.lvl?' 升环':''}</option>`);
    }
    slotOpts=opts.join('')||'<option disabled>无可用法术位</option>';
  }
  const mat=spellMaterial(spell);
  let matLine='';
  if(mat){
    if(mat.kind==='consumed')matLine=`<div class="material-line consumed">⚠ <strong>消耗材料：</strong>${mat.desc}${mat.gp?`（${mat.gp} GP）`:''}<br><span style="font-weight:normal;font-size:11px">施法即用掉一份；记得在装备里减少库存。</span></div>`;
    else if(mat.kind==='valuable')matLine=`<div class="material-line valuable">💎 <strong>必备材料：</strong>${mat.desc}（${mat.gp} GP，不消耗）<br><span style="font-weight:normal;font-size:11px">价值高于 1 GP，奥术法器/成分包<u>无法</u>替代，需实际持有。</span></div>`;
    else matLine=`<div class="material-line normal">材料：${mat.desc}${mat.focusable?'<span style="font-size:11px"> · 可由奥术法器/成分包替代</span>':''}</div>`;
  }
  const hasBuff=!!spell.buff;
  // 施法距离 '自身' / '自身(N尺)' / 'Self' 表示规则上只能给自己施 → disable「他人」
  const isSelfOnly=hasBuff&&/^(自身|Self)/i.test(spell.range||'');
  const buffTargetRow=hasBuff?`<div class="modal-row"><span>BUFF 目标：</span>
    <div class="adv-toggle">
      <button class="active" data-buff-target="self">自身</button>
      <button data-buff-target="other" ${isSelfOnly?'disabled title="此法术施法距离为「'+spell.range+'」，规则上只能给自己施加"':'title="不挂到自己卡上，导出分享串给队友"'} ${isSelfOnly?'style="opacity:.4;cursor:not-allowed"':''}>他人${isSelfOnly?' 🚫':'（导出）'}</button>
    </div>
  </div>`:'';
  openModal(`<h3>${isCantrip?'戏法':spell.lvl+'环'}：${spell.name}</h3>
    <div class="modal-row" style="font-size:12px;color:var(--text-dim)">
      <span>${spell.school||''}</span><span>·</span>
      <span>${spell.ct||''}</span><span>·</span>
      <span>${spell.range||''}</span><span>·</span>
      <span>成分${spell.comp||''}</span><span>·</span>
      <span>${spell.dur||''}</span>
      ${spell.conc?'<span style="color:var(--accent)">·专注</span>':''}
      ${spell.ritual?'<span style="color:var(--gold)">·仪式</span>':''}
    </div>
    ${matLine}
    <div style="margin:10px 0;font-size:13px;line-height:1.6">${spell.desc||''}</div>
    ${!isCantrip?`<div class="modal-row"><span>消耗法术位：</span><select id="slot-sel">${slotOpts}</select></div>`:''}
    ${buffTargetRow}
    <div id="cast-result"></div>
    <div class="modal-buttons">
      <button onclick="closeModal()">关闭</button>
      <button id="btn-roll-dmg">${spell.damage?`投 ${spell.damage}`:'投伤害骰…'}</button>
      ${spell.summonSource?`<button id="btn-spell-summon" title="${summonVerb(spell.summonSource)}一个 ${spell.summonSource} 形态">${summonVerb(spell.summonSource)}…</button>`:''}
      ${isCantrip&&spell.buff?`<button class="primary" id="btn-cast-cantrip-buff" title="施加增益到自身">施加 BUFF</button>`:''}
      ${!isCantrip&&spell.ritual?`<button id="btn-cast-ritual" title="花 10 分钟以仪式施展，不消耗法术位">仪式（不扣位）</button>`:''}
      ${!isCantrip?`<button class="primary" id="btn-cast">施放（扣位）</button>`:''}
    </div>`);
  // 升环时按 select 当前环阶动态算 damage 表达式
  function currentDmgExpr(){
    if(isCantrip)return spell.damage||'';
    const sel=document.getElementById('slot-sel');
    const lv=sel?parseInt(sel.value)||spell.lvl:spell.lvl;
    return getUpcastDamage(spell,lv);
  }
  function refreshDmgBtn(){
    const btn=document.getElementById('btn-roll-dmg');
    const expr=currentDmgExpr();
    btn.textContent=expr?`投 ${expr}`:'投伤害骰…';
  }
  if(!isCantrip){
    const sel=document.getElementById('slot-sel');
    if(sel)sel.addEventListener('change',refreshDmgBtn);
    refreshDmgBtn();
  }
  // BUFF 目标切换：'self' (默认) | 'other'。仅当 spell.buff 存在时显示了切换按钮。
  // 施法距离=自身的法术 isSelfOnly=true → 「他人」按钮 disabled，强制 self
  let buffTarget='self';
  if(hasBuff){
    document.querySelectorAll('[data-buff-target]').forEach(b=>b.addEventListener('click',()=>{
      if(b.hasAttribute('disabled'))return;
      buffTarget=b.dataset.buffTarget;
      document.querySelectorAll('[data-buff-target]').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    }));
  }
  document.getElementById('btn-roll-dmg').addEventListener('click',()=>{
    let expr=currentDmgExpr();
    if(!expr){
      expr=prompt('输入要投的骰子表达式（如 8d6, 3d4+3, 3·(1d4+1)）：','');
      if(!expr)return;
    }
    const r=rollExpr(expr);
    if(!r){alert('解析失败：'+expr);return}
    const detail=r.detail||`[${r.rolls.join(',')}] ${r.mod?fmt(r.mod):''}`;
    document.getElementById('cast-result').innerHTML=`<div class="roll-result"><div class="total">${r.total}</div><div class="roll-detail">${expr}: ${detail}</div></div>`;
    pushHistory(`${spell.name}伤害`,r.total,`${expr}: ${detail}`);
  });
  if(!isCantrip){
    document.getElementById('btn-cast').addEventListener('click',()=>{
      const sel=document.getElementById('slot-sel');
      if(!sel.value){alert('无可用法术位');return}
      const lv=parseInt(sel.value);
      const s=sc.slots[lv];
      if(!Array.isArray(s.used))s.used=Array(s.max).fill(false);
      const idx=s.used.indexOf(false);
      if(idx===-1){alert('该环没可用法术位');return}
      const matInfo=spellMaterial(spell);
      let extra='';
      if(matInfo&&matInfo.kind==='consumed'){
        if(!confirm(`本次施放将消耗：${matInfo.desc}${matInfo.gp?`（${matInfo.gp} GP）`:''}。\n\n确认施放？\n（记得手动从装备/财产中减除该材料）`))return;
        extra=` · 消耗 ${matInfo.desc}${matInfo.gp?` (${matInfo.gp}gp)`:''}`;
      }
      // 专注追踪：先做替换确认，再扣位
      if(spell.conc&&!setConcentration(spell,lv))return;
      s.used[idx]=true;
      const toOther=hasBuff&&buffTarget==='other';
      if(toOther){
        // 不挂自己 buffs，弹分享串
        saveChar();renderSpells();renderStatus();renderCombat();
        pushHistory(`施放-${spell.name}（给他人）`,lv,`消耗 ${lv} 环法术位${extra}${spell.conc?' · 专注由你维持':''} · 待复制串`);
        showBuffExportDialog(spell,lv);
      }else{
        pushSpellBuff(spell,lv);
        saveChar();renderSpells();renderStatus();renderCombat();
        pushHistory(`施放-${spell.name}`,lv,`消耗 ${lv} 环法术位${extra}${spell.conc?' · 专注':''}${spell.buff?' · BUFF 已施加':''}`);
        closeModal();
      }
    });
    // 仪式施法（不扣位，10 分钟）
    const ritualBtn=document.getElementById('btn-cast-ritual');
    if(ritualBtn){
      ritualBtn.addEventListener('click',()=>{
        if(spell.conc&&!setConcentration(spell,spell.lvl))return;
        const toOther=hasBuff&&buffTarget==='other';
        if(toOther){
          saveChar();renderStatus();renderCombat();
          pushHistory(`仪式施法-${spell.name}（给他人）`,spell.lvl,`不扣位${spell.conc?' · 专注由你维持':''} · 待复制串`);
          showBuffExportDialog(spell,spell.lvl);
        }else{
          pushSpellBuff(spell,spell.lvl);
          saveChar();renderStatus();renderCombat();
          pushHistory(`仪式施法-${spell.name}`,spell.lvl,`花 10 分钟以仪式施展，不消耗法术位${spell.conc?' · 专注':''}${spell.buff?' · BUFF 已施加':''}`);
          closeModal();
        }
      });
    }
  }
  // 戏法施加 BUFF（无需扣位）
  const cantripBuffBtn=document.getElementById('btn-cast-cantrip-buff');
  if(cantripBuffBtn){
    cantripBuffBtn.addEventListener('click',()=>{
      if(spell.conc&&!setConcentration(spell,0))return;
      const toOther=buffTarget==='other';
      if(toOther){
        saveChar();renderStatus();renderCombat();
        pushHistory(`施放-${spell.name}（给他人）`,0,`戏法${spell.conc?' · 专注由你维持':''} · 待复制串`);
        showBuffExportDialog(spell,0);
      }else{
        pushSpellBuff(spell,0);
        saveChar();renderStatus();renderCombat();
        pushHistory(`施放-${spell.name}`,0,`戏法 BUFF${spell.conc?' · 专注':''}`);
        closeModal();
      }
    });
  }
  // 召唤按钮（戏法或法术皆可）：直接 picker；激活由 picker 内部 click 处理
  const summonBtn=document.getElementById('btn-spell-summon');
  if(summonBtn){
    summonBtn.addEventListener('click',()=>{
      closeModal();
      showSummonPicker(spell.summonSource);
    });
  }
}

/* === 专注 helpers === */
function setConcentration(spell,castLvl){
  const cur=char.combat.concentration;
  if(cur&&cur.spellName){
    if(!confirm(`你当前正在专注 ${cur.spellName}${cur.spellLvl?` (${cur.spellLvl}环)`:''}。\n施展 ${spell.name} 将取消该专注。\n\n确认？`))return false;
    // 替换专注：先清掉与旧 conc 关联的 buff
    clearBuffsForConc(cur.spellName);
  }
  char.combat.concentration={spellName:spell.name,spellLvl:castLvl||spell.lvl||0};
  return true;
}
/* === BUFF 跨卡分享（P2）===
   分享串格式：'dnd5buff:' + base64(UTF-8(JSON))
   payload schema:
     { v:1, originId, from, name, spellName, castLvl, conc, durationText, desc, modifiers }
   originId = `${senderName}-${ts}-${rand}` 用于接收方防重复导入。
*/
function encodeBuffShare(payload){
  try{
    const json=JSON.stringify(payload);
    // UTF-8 安全 base64
    const b64=btoa(unescape(encodeURIComponent(json)));
    return 'dnd5buff:'+b64;
  }catch(e){console.warn('encodeBuffShare failed',e);return null}
}
function decodeBuffShare(str){
  if(!str)return null;
  const s=String(str).trim();
  if(!s.startsWith('dnd5buff:'))return null;
  try{
    const b64=s.slice('dnd5buff:'.length).replace(/\s+/g,'');
    const json=decodeURIComponent(escape(atob(b64)));
    const obj=JSON.parse(json);
    if(obj&&obj.v===1&&obj.name&&typeof obj.modifiers==='object')return obj;
  }catch(e){console.warn('decodeBuffShare failed',e)}
  return null;
}
function buildSharePayload(spell,castLvl){
  const senderName=(char.meta&&char.meta.name)||'某人';
  const b=spell.buff||{};
  return {
    v:1,
    originId:`${senderName}-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
    from:senderName,
    name:b.name||spell.name,
    spellName:spell.name,
    castLvl:castLvl||spell.lvl||0,
    conc:!!spell.conc,
    durationText:b.durationText||spell.dur||'',
    desc:b.desc||spell.desc||'',
    modifiers:b.modifiers||{}
  };
}

/* 把 spell.buff 落地到 char.combat.buffs（同名先去重）。无 buff 字段时空操作。 */
function pushSpellBuff(spell,castLvl){
  if(!spell||!spell.buff)return;
  const b=spell.buff;
  if(!Array.isArray(char.combat.buffs))char.combat.buffs=[];
  // 同名 spell 先去重：避免重复施放法师护甲叠加多条
  char.combat.buffs=char.combat.buffs.filter(x=>x.spellName!==spell.name);
  char.combat.buffs.push({
    id:genBuffId(),
    name:b.name||spell.name,
    source:'自身',
    spellName:spell.name,
    castLvl:castLvl||spell.lvl||0,
    conc:!!spell.conc,
    durationText:b.durationText||spell.dur||'',
    desc:b.desc||spell.desc||'',
    modifiers:b.modifiers||{}
  });
  saveChar();
}

function doConcentrationSave(){
  const cur=char.combat.concentration;
  if(!cur||!cur.spellName){alert('当前未专注任何法术');return}
  const dmgStr=prompt(`受到的伤害是多少？\n（豁免 DC = max(10, 伤害/2)）`,'10');
  const dmg=parseInt(dmgStr);
  if(!dmg||dmg<=0)return;
  const dc=Math.max(10,Math.floor(dmg/2));
  const conSave=saveBonus(char,'con');
  const r=rollDie(20);
  const total=r+conSave;
  const success=r===20||(r!==1&&total>=dc);
  const detail=`D20: ${r} ${fmt(conSave)} = ${total} vs DC${dc} → ${success?'成功':'失败'}`;
  pushHistory(`维持专注-${cur.spellName}`,total,`伤害 ${dmg} → ${detail}`);
  if(!success){
    clearBuffsForConc(cur.spellName);
    char.combat.concentration=null;
    alert(`💥 豁免失败！\n专注 ${cur.spellName} 已结束。\n\n${detail}`);
  }else{
    alert(`✓ 豁免成功，继续专注 ${cur.spellName}。\n\n${detail}`);
  }
  saveChar();renderStatus();renderCombat();
}

      <button id="btn-hp-full">满血</button>
    </div>

    </div>`:''}
    <div class="modal-buttons">
      <button onclick="closeModal()">关闭</button>
      <button class="primary" id="btn-hp-save">保存上限/临时</button>
    </div>`);
  const refresh=()=>{document.getElementById('hp-cur-d').textContent=c.combat.hpCur;renderCombat();if(isMain)renderStatus();saveChar()};
  document.getElementById('btn-hp-dmg').addEventListener('click',()=>{
    let d=parseInt(document.getElementById('hp-delta').value)||0;
    if(d<=0)return;
    if(c.combat.hpTemp>0){
      const t=Math.min(c.combat.hpTemp,d);
      c.combat.hpTemp-=t;d-=t;
      document.getElementById('hp-temp-i').value=c.combat.hpTemp;
    }
    c.combat.hpCur=Math.max(0,c.combat.hpCur-d);
    refresh();
  });
  document.getElementById('btn-hp-heal').addEventListener('click',()=>{
    const d=parseInt(document.getElementById('hp-delta').value)||0;
    c.combat.hpCur=Math.min(c.combat.hpMax,c.combat.hpCur+d);
    refresh();
  });
  document.getElementById('btn-hp-full').addEventListener('click',()=>{c.combat.hpCur=c.combat.hpMax;refresh()});
  if(isMain){
    const addDs=k=>{const a=c.combat.deathSaves[k];const idx=a.indexOf(false);if(idx>=0)a[idx]=true};
    document.getElementById('btn-ds-s').addEventListener('click',()=>{addDs('success');refresh()});
    document.getElementById('btn-ds-f').addEventListener('click',()=>{addDs('fail');refresh()});
    document.getElementById('btn-ds-r').addEventListener('click',()=>{c.combat.deathSaves={success:[false,false,false],fail:[false,false,false]};refresh()});
  }
  document.getElementById('btn-hp-save').addEventListener('click',()=>{
    c.combat.hpMax=parseInt(document.getElementById('hp-max-i').value)||c.combat.hpMax;
    c.combat.hpTemp=parseInt(document.getElementById('hp-temp-i').value)||0;
    refresh();closeModal();
  });
}

/* === 数值编辑器 ===
   原则：5e 的"加值字段"已在数据模型里（acBonus / initBonus / saveBonus / skill.bonus / attackBonus 等），
   点显示值打开 prompt/modal 改它们，render() 自然把所有派生值重算一遍。
*/
/* 自定义"prompt"模态：避免 iOS / 微信内置浏览器把原生 prompt 标题显示成 (null)。
   opts: {type:'number'|'text', hint:'说明文本', placeholder:''} */
function promptModal(title,current,onOK,opts){
  opts=opts||{};
  const type=opts.type||'number';
  const hint=opts.hint||'';
  const placeholder=opts.placeholder||'';
  const cur=String(current==null?'':current).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  openModal(`<h3>${title}</h3>
    ${hint?`<div style="color:var(--text-dim);font-size:12px;line-height:1.5;margin-bottom:10px;white-space:pre-line">${hint}</div>`:''}
    <div class="modal-row" style="display:block">
      <input id="pm-input" type="${type}" value="${cur}" placeholder="${placeholder}" style="width:100%;font-size:16px;padding:10px;box-sizing:border-box;text-align:left">
    </div>
    <div class="modal-buttons">
      <button onclick="closeModal()">取消</button>
      <button id="pm-ok" class="primary">确定</button>
    </div>`);
  const input=document.getElementById('pm-input');
  setTimeout(()=>{input.focus();try{input.select()}catch(e){}},80);
  const submit=()=>{
    const v=input.value;
    closeModal();
    onOK(v);
  };
  document.getElementById('pm-ok').addEventListener('click',submit);
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();submit()}
  });
}

document.addEventListener('click',e=>{
