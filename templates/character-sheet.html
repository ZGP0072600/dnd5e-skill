  if(t.closest('[data-resource-summon]')){
    e.stopPropagation();  // 不冒泡到资源 pip toggle
    const src=t.closest('[data-resource-summon]').dataset.resourceSummon;
    showSummonPicker(src);return;
  }
  if(t.matches('[data-tab]')){
    switchTab(parseInt(t.dataset.tab));return;
  }
  if(t.matches('[data-toggle-prof]')){
    e.stopPropagation();
    const c=activeChar();
    const sk=t.dataset.toggleProf;
    c.skills=c.skills||{};
    const cur=(c.skills[sk]&&c.skills[sk].prof)||'none';
    const cycle={none:'prof',prof:'expert',expert:'half',half:'none'};
    c.skills[sk]=c.skills[sk]||{bonus:0};
    c.skills[sk].prof=cycle[cur];
    saveChar();renderSkills();return;
  }
  if(t.matches('[data-edit-name]')){
    e.stopPropagation();
    // 主体名编辑（companion tab 时点 header 名字仍编辑主体名）
    promptModal('角色名',char.meta.name||'',(v)=>{
      if(v==null||!v.trim())return;
      char.meta.name=v.trim();saveChar();render();
    },{type:'text'});
    return;
  }
  if(t.matches('[data-edit-ab]')){
    e.stopPropagation();
    const c=activeChar();
    const ab=t.dataset.editAb;
    const cur=c.abilities[ab]?c.abilities[ab].score:10;
    promptModal(`${RULES.abilityNames[ab]}属性分数`,cur,(v)=>{
      if(v==null||v==='')return;
      const n=parseInt(v);
      if(isNaN(n)||n<1||n>30){alert('请输入 1-30 之间的整数');return}
      c.abilities[ab]=c.abilities[ab]||{score:10,saveProf:false,saveBonus:0};
      c.abilities[ab].score=n;saveChar();render();
    },{hint:'1 - 30 之间整数'});
    return;
  }
  if(t.matches('[data-edit-save]')){
    e.stopPropagation();
    editSave(t.dataset.editSave);return;
  }
  if(t.matches('[data-edit-skill]')){
    e.stopPropagation();
    editSkillBonus(t.dataset.editSkill);return;
  }
  if(t.matches('[data-edit-attack]')){
    e.stopPropagation();
    editAttackBonus(parseInt(t.dataset.editAttack));return;
  }
  const editEl=t.closest('[data-edit]');
  if(editEl){
    e.stopPropagation();
    const k=editEl.dataset.edit;
    if(k==='init')editInit();
    else if(k==='ac')editAC();
    else if(k==='dc')editSpellDC();
    else if(k==='speed')editSpeed();
    else if(k==='size')editSize();
    else if(k==='hd')editHd();
    else if(k==='resistance')editResistance();
    else if(k==='spellDc')editSpellDC();
    else if(k==='spellAtk')editSpellAttack();
    else if(k==='globalSkill')editGlobalSkillBonus();
    return;
  }
  if(t.matches('.slot-pip')){
    const lv=parseInt(t.dataset.slot),i=parseInt(t.dataset.i);
    const s=char.spellcasting.slots[lv];
    if(!Array.isArray(s.used))s.used=Array(s.max).fill(false);
    s.used[i]=!s.used[i];
    saveChar();renderSpells();return;
  }
  if(t.matches('.pip[data-res]')){
    const c=activeChar();
    const ri=parseInt(t.dataset.res),i=parseInt(t.dataset.i);
    const r=c.classResources[ri];
    if(!Array.isArray(r.used))r.used=Array(r.max).fill(false);
    r.used[i]=!r.used[i];
    saveChar();renderResources();return;
  }
  if(t.matches('.death-pip')){
    const k=t.dataset.ds,i=parseInt(t.dataset.i);
    const ds=char.combat.deathSaves;
    if(!Array.isArray(ds[k]))ds[k]=[false,false,false];
    ds[k][i]=!ds[k][i];
    saveChar();renderStatus();return;
  }
  if(t.id==='insp-toggle'){char.meta.inspiration=!char.meta.inspiration;saveChar();renderStatus();return}
  if(t.id==='btn-conc-release'){
    const c=char.combat.concentration;
    if(c){
      pushHistory('释放专注',0,`主动释放对 ${c.spellName} 的专注`);
      clearBuffsForConc(c.spellName);
    }
    char.combat.concentration=null;saveChar();renderStatus();renderCombat();return;
  }
  if(t.matches('[data-buff-rm]')){
    e.stopPropagation();
    const id=t.dataset.buffRm;
    const b=(char.combat.buffs||[]).find(x=>x.id===id);
    if(!b)return;
    // 若是当前专注的 buff，同时释放专注
    if(b.conc&&b.spellName){
      const cur=char.combat.concentration;
      if(cur&&cur.spellName===b.spellName){
        char.combat.concentration=null;
        pushHistory('释放专注',0,`取消 ${b.name} 同时释放专注`);
      }
    }
    pushHistory('取消 BUFF',0,b.name);
    removeBuff(id);
    renderStatus();renderCombat();
    return;
  }
  if(t.id==='btn-conc-save'){doConcentrationSave();return}
  if(t.id==='add-status'){showStatusPicker();return}
  if(t.id==='btn-buff-import'){showBuffImportDialog();return}
  if(t.matches('[data-status-info]')){
    showStatusInfo(t.dataset.statusInfo);return;
  }
  if(t.matches('[data-status-rm]')){
    const s=t.dataset.statusRm;
    char.combat.statusEffects=(char.combat.statusEffects||[]).filter(x=>x!==s);
    saveChar();renderStatus();return;
  }
  if(t.closest('[data-roll="save"]')){
    const c=activeChar();
    const ab=t.closest('[data-roll="save"]').dataset.ab;
    showRollDialog(`${RULES.abilityNames[ab]}豁免`,saveBonus(c,ab),{kind:'save',ability:ab});return;
  }
  if(t.closest('[data-roll="ability"]')){
    const c=activeChar();
    const ab=t.closest('[data-roll="ability"]').dataset.ab;
    showRollDialog(`${RULES.abilityNames[ab]}检定`,abMod((c.abilities[ab]||{score:10}).score),{kind:'check',ability:ab});return;
  }
  if(t.closest('[data-roll="skill"]')){
    const c=activeChar();
    const sk=t.closest('[data-roll="skill"]').dataset.skill;
    const skMeta=RULES.skills.find(s=>s.key===sk);
    showRollDialog(`${skMeta.name}检定`,skillBonus(c,sk),{kind:'skill',ability:skMeta.ability});return;
  }
  if(t.closest('[data-roll="initiative"]')){showRollDialog('先攻',initiative(activeChar()),{kind:'init',ability:'dex'});return}
  if(t.closest('[data-roll="perception"]')){showRollDialog('察觉检定',skillBonus(activeChar(),'perception'),{kind:'skill',ability:'wis'});return}
  if(t.closest('[data-roll="attack"]')){
    const i=parseInt(t.closest('[data-roll="attack"]').dataset.i);
    showAttackDialog(i);return;
  }
  if(t.closest('[data-spell-i]')){
    const i=parseInt(t.closest('[data-spell-i]').dataset.spellI);
    const sp=document.getElementById('spell-list')._allSpells[i];
    showSpellDialog(sp);return;
  }
  if(t.closest('#hp-bar')){showHPDialog();return}
  if(t.matches('[data-special-roll]')){triggerSpecialRoll(parseInt(t.dataset.specialRoll));return}
  if(t.matches('[data-special-table]')){showSpecialRollTable(parseInt(t.dataset.specialTable));return}
});

document.addEventListener('change',e=>{
  const t=e.target;
  if(t.matches('[data-coin]')){
    char.wealth[t.dataset.coin]=parseInt(t.value)||0;
    saveChar();
    document.getElementById('wealth-total').textContent=totalGP(char)+' GP';
    return;
  }
  if(t.id==='notes-input'){
    if(isMainView()){char.meta.notes=t.value}
    else{const c=activeChar();c.notes=t.value}
    saveChar();return;
  }
});

/* === 短休 === */
function consumeHdInteractive(){
  const groups=classHdGroups(char);
  const conMod=abMod(char.abilities.con.score);
  let totalSpent=0,totalRecover=0;
  const detail=[];
  let remaining=char.combat.hdCur;
  if(remaining<=0){alert('无可用 HD');return}
  if(groups.length<=1){
    const g=groups[0]||{hd:8,names:['']};
    const v=parseInt(prompt(`要消耗几个 HD？（当前 ${char.combat.hdCur}/${char.combat.hdMax}，每个回 d${g.hd} + 体调 ${fmt(conMod)}）`,'0'))||0;
    if(v<=0)return;
    const useN=Math.min(v,remaining);
    let sub=0;const rolls=[];
    for(let i=0;i<useN;i++){const r=rollDie(g.hd);rolls.push(r);sub+=r+conMod}
    sub=Math.max(useN,sub);
    totalSpent=useN;totalRecover=sub;
    detail.push(`${useN}d${g.hd}: [${rolls.join(',')}]+${conMod}×${useN}`);
  }else{
    for(const g of groups){
      if(remaining<=0)break;
      const cap=Math.min(g.levels,remaining);
      if(cap<=0)continue;
      const v=parseInt(prompt(`【${g.names.join('/')} d${g.hd}】消耗几个？\n该职业等级 ${g.levels}，HD 总池剩 ${remaining}，可消耗至多 ${cap}。`,'0'))||0;
      if(v<=0)continue;
      const useN=Math.min(v,cap);
      let sub=0;const rolls=[];
      for(let i=0;i<useN;i++){const r=rollDie(g.hd);rolls.push(r);sub+=r+conMod}
      sub=Math.max(useN,sub);
      totalSpent+=useN;
      totalRecover+=sub;
      detail.push(`${useN}d${g.hd}: [${rolls.join(',')}]`);
      remaining-=useN;
    }
    if(totalSpent>0)detail.push(`+${conMod}×${totalSpent}`);
  }
  if(totalSpent===0)return;
  char.combat.hpCur=Math.min(char.combat.hpMax,char.combat.hpCur+totalRecover);
  char.combat.hdCur-=totalSpent;
  pushHistory('短休HD',totalRecover,detail.join(' '));
  alert(`恢复 ${totalRecover} HP`);
}

/* 全 entity 列表（主体 + 所有 companions），用于长/短休批量重置资源 / HP */
function allEntities(){return [char,...(char.companions||[])]}

function shortRest(){
  if(!confirm('短休 1 小时？\n- 可消耗 HD 恢复 HP（仅主体）\n- 恢复主体 + 全部伴生的「短休」资源'))return;
  for(const e of allEntities()){
    for(const r of e.classResources||[]){if(r.resetType==='shortRest')r.used=Array(r.max).fill(false)}
  }
  consumeHdInteractive();
  saveChar();render();
}

/* === 长休 === */
function longRest(){
  if(!confirm('长休 8 小时？\n- 主体 + 全部伴生 HP 全满\n- 主体 HD 恢复半数（向下取整，至少 1）\n- 主体全部法术位回满\n- 主体 + 伴生的「长休/短休」资源恢复\n- 主体重置死亡豁免\n- 清空全部 BUFF 与专注'))return;
  // 主体
  char.combat.hpCur=char.combat.hpMax;
  char.combat.hpTemp=0;
  char.combat.hdCur=Math.min(char.combat.hdMax,char.combat.hdCur+Math.max(1,Math.floor(char.combat.hdMax/2)));
  char.combat.deathSaves={success:[false,false,false],fail:[false,false,false]};
  char.combat.buffs=[];
  char.combat.concentration=null;
  if(char.spellcasting&&char.spellcasting.slots){
    for(const lv of Object.keys(char.spellcasting.slots)){
      const s=char.spellcasting.slots[lv];
      s.used=Array(s.max).fill(false);
    }
  }
  if(char.spellcasting&&char.spellcasting.spellPoints)char.spellcasting.spellPoints.cur=char.spellcasting.spellPoints.max;
  // 主体 + 全部伴生：HP 全满 + 资源回满
  for(const e of allEntities()){
    if(e.combat){e.combat.hpCur=e.combat.hpMax;e.combat.hpTemp=0}
    for(const r of e.classResources||[]){if(r.resetType==='longRest'||r.resetType==='shortRest')r.used=Array(r.max).fill(false)}
  }
  // 清空所有变身/召唤的 active 状态（永久伴生 type=companion 保持不变）
  const summons=(char.companions||[]).filter(c=>(c.type==='wildShape'||c.type==='summon')&&isCompanionActive(c));
  if(summons.length){
    if(confirm(`长休期间通常无法持续变身/召唤。\n是否解除以下 ${summons.length} 个：\n${summons.map(c=>'  · '+c.name).join('\n')}`)){
      for(const c of summons)c.active=false;
      // 如果当前 view 是被解除的 companion，切回主体
      const idx=char.meta.viewIndex;
      if(idx>=0&&char.companions[idx]&&!isCompanionActive(char.companions[idx])){
        char.meta.viewIndex=-1;
        displayChar=char;
      }
    }
  }
  saveChar();render();
  alert('长休完成');
}

/* === 骰史 === */
function showHistory(){
  const items=char.rollHistory||[];
  openModal(`<h3>骰史 (最近 ${items.length})</h3>
    <div class="history-list">
      ${items.length===0?'<div style="color:var(--text-dim)">暂无</div>':
        items.map(h=>`<div class="history-item">
          <span class="label">${h.label}</span>
          <span class="val num">${h.total}</span>
          <div style="color:var(--text-dim);font-size:11px;margin-top:2px">${h.detail||''}</div>
        </div>`).join('')}
    </div>
    <div class="modal-buttons">
      <button onclick="closeModal()">关闭</button>
      <button id="btn-clear-h">清空</button>
    </div>`);
  document.getElementById('btn-clear-h').addEventListener('click',()=>{
    if(confirm('清空骰史？')){char.rollHistory=[];saveChar();closeModal()}
  });
}


/* === 骰娘命令 === */
function diceBotCmd(){
  const ab=char.abilities;
  const parts=[];
  for(const k of ['str','dex','con','int','wis','cha']){
    parts.push(`${RULES.abilityNames[k]}${ab[k].saveProf?'*':''}:${ab[k].score}`);
  }
  parts.push(`hp:${char.combat.hpCur}`);
  parts.push(`hpmax:${char.combat.hpMax}`);
  parts.push(`先攻:${initiative(char)}`);
  parts.push(`ac:${ac(char)}`);
  const dc=spellDC(char);if(dc!=null)parts.push(`dc:${dc}`);
  parts.push(`pp:${passivePerception(char)}`);
  parts.push(`熟练:${profBonus(char)}`);
  for(const sk of RULES.skills){
    const d=char.skills[sk.key]||{prof:'none'};
    const mark=d.prof==='prof'?'*':d.prof==='expert'?'*2':d.prof==='half'?'*0.5':'';
    parts.push(`${sk.name}${mark}:${skillBonus(char,sk.key)}`);
  }
  const cmd='.nn '+(char.meta.name||'人物卡')+'\n.dst '+parts.join(' ');
  openModal(`<h3>骰娘命令导出</h3>
    <p style="font-size:12px;color:var(--text-dim)">复制以下两行发到群里给骰娘（海豹/Olivia/Dice!/MDice/塔骰 等）。</p>
    <textarea id="dst-ta" readonly style="width:100%;height:200px;font-family:monospace;font-size:12px"></textarea>
    <div class="modal-buttons">
      <button onclick="closeModal()">关闭</button>
      <button class="primary" id="btn-copy-dst">复制</button>
    </div>`);
  document.getElementById('dst-ta').value=cmd;
  document.getElementById('btn-copy-dst').addEventListener('click',async()=>{
    try{await navigator.clipboard.writeText(cmd);alert('已复制')}
    catch(e){document.getElementById('dst-ta').select();document.execCommand('copy');alert('已复制（兼容模式）')}
  });
}

/* === 顶部按钮绑定 === */
document.getElementById('btn-rest-short').addEventListener('click',shortRest);
document.getElementById('btn-rest-long').addEventListener('click',longRest);
document.getElementById('btn-history').addEventListener('click',showHistory);
document.getElementById('btn-dice-cmd').addEventListener('click',diceBotCmd);
document.getElementById('btn-theme').addEventListener('click',()=>{
  const cur=document.body.dataset.theme||'dark';
  document.body.dataset.theme=cur==='dark'?'light':'dark';
  try{localStorage.setItem('dnd5e-theme',document.body.dataset.theme)}catch(e){}
});

/* === 启动 === */
char=loadChar();
// 恢复上次的 tab 视图
{
  const idx=(char.meta&&typeof char.meta.viewIndex==='number')?char.meta.viewIndex:-1;
  const comps=char.companions||[];
  displayChar=(idx>=0&&comps[idx])?comps[idx]:char;
}
try{const t=localStorage.getItem('dnd5e-theme');if(t)document.body.dataset.theme=t}catch(e){}
render();
</script>
