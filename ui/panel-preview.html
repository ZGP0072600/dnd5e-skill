<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>DnD5e Panel 预览</title>
<style>
  body {
    margin: 0;
    background: #0a0814;
    font-family: 'Pixelify Sans', 'Zpix', 'Courier New', monospace;
    color: #f0e6d2;
  }
  .preview-bar {
    position: sticky;
    top: 0;
    background: #15131f;
    border-bottom: 2px solid #4a4670;
    padding: 8px 12px;
    z-index: 100;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .preview-bar span {
    font-size: 12px;
    color: #b8a982;
    margin-right: 4px;
  }
  .preview-bar button {
    padding: 4px 10px;
    background: #2a2740;
    color: #f0e6d2;
    border: 1px solid #7e7aa3;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    box-shadow: 1px 1px 0 #15131f;
  }
  .preview-bar button.active {
    background: #e8c547;
    color: #15131f;
    border-color: #e8c547;
  }
  .preview-bar button:hover { color: #e8c547; }
  .preview-bar button.active:hover { color: #15131f; }
  .container {
    display: flex;
    justify-content: center;
    padding: 16px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .frame-wrap {
    width: 340px;
    background: #15131f;
    border: 2px solid #4a4670;
    box-shadow: 4px 4px 0 #000;
    overflow: hidden;
  }
  .frame-label {
    background: #2a2740;
    border-bottom: 1px solid #4a4670;
    padding: 4px 10px;
    font-size: 11px;
    color: #e8c547;
    letter-spacing: 1px;
  }
  iframe {
    display: block;
    width: 340px;
    height: 720px;
    border: 0;
    background: #15131f;
  }
</style>
</head>
<body>

<div class="preview-bar">
  <span>📋 场景预览：</span>
  <button data-scene="all" class="active">全部并排</button>
  <button data-scene="sandbox">沙盒 (I)</button>
  <button data-scene="combat">战斗 (G)</button>
  <button data-scene="idle">未开桌</button>
</div>

<div class="container" id="container"></div>

<script>
  // 三种场景的 mock 数据 ===========================================

  var SCENES = {
    sandbox: {
      _schema: "v1",
      mode: "I",
      campaign: {
        name: "博德之门-王小明的日常3",
        dmStyle: "标准（宽松+NSFW opt-in）",
        inGameTime: "1492 DR · 风岚月 15 日 · 下午 3 时",
        timeOfDay: "下午",
        weather: "晴",
        location: "博德之门郊区 · 王府庄园"
      },
      players: [{
        name: "王小明",
        class: "奇械师 3（战地匠师）",
        hpCur: 30, hpMax: 30, ac: 18,
        xp: { cur: 900, next: 2700, level: 3 },
        status: []
      }],
      sandbox: {
        companions: [
          { name: "阿掠", type: "steeldefender", hp: "15/15", role: "第三代机械守卫" },
          { name: "阿芝莎", type: "mercenary", role: "双剑流 · 契约保镖" }
        ],
        activeCommissions: [],
        keyRelationships: [
          { name: "薇拉雅", stage: "母性长辈 (亲和度 80)", lastSeen: "风岚月 15 日 · 下午（庄园迎接）" },
          { name: "阿芝莎", stage: "嘴硬期 (亲和度 20)", lastSeen: "风岚月 15 日 · 下午（抵达庄园）" }
        ],
        assetsBrief: [
          "现金 150 GP + 信托基金",
          "王府庄园（三层 + B1/B2）",
          "货物存货 ~2000 GP"
        ]
      },
      lastUpdate: "2026-05-26T15:00:00+08:00"
    },

    combat: {
      _schema: "v1",
      mode: "G",
      campaign: {
        name: "风骸岛之龙-小明组",
        dmStyle: "粉红恋爱向",
        inGameTime: "晨晖月 12 日 · 上午",
        timeOfDay: "上午",
        weather: "雾",
        location: "巨龙休息处修道院 · 海藻洞穴入口"
      },
      players: [
        {
          name: "羽痕",
          class: "术士 3（龙血裔）",
          hpCur: 14, hpMax: 24, ac: 13,
          xp: { cur: 1800, next: 2700, level: 3 },
          status: [
            { name: "专注:祝福术", type: "conc" },
            { name: "暗影侵蚀", type: "debuff", duration: "2 回合" }
          ]
        },
        {
          name: "塔拉克",
          class: "战士 3（防御战法）",
          hpCur: 6, hpMax: 32, ac: 18,
          xp: { cur: 1800, next: 2700, level: 3 },
          status: [
            { name: "嘲讽", type: "buff", duration: "1 回合" }
          ]
        }
      ],
      module: {
        name: "风骸岛之龙",
        currentChapter: "第二章：海藻洞穴",
        progress: "3/6 遭遇完成"
      },
      combat: {
        round: 3,
        turnIndex: 2,
        currentActor: "僵尸 A",
        initiative: [
          { name: "羽痕", init: 17, hp: "14/24", isPC: true },
          { name: "塔拉克", init: 15, hp: "6/32", isPC: true },
          { name: "僵尸 A", init: 14, hp: "重伤", isPC: false, isCurrent: true },
          { name: "僵尸 B", init: 12, hp: "健康", isPC: false },
          { name: "僵尸 C", init: 8, hp: "濒死", isPC: false }
        ]
      },
      lastUpdate: "2026-05-26T15:00:00+08:00"
    },

    idle: {
      _schema: "v1",
      mode: "idle",
      campaign: null,
      players: [],
      lastUpdate: "2026-05-26T10:00:00+08:00"
    }
  };

  // 共享 mock：模组索引 + 全局存档 + 弹窗实体（喂给 v2 sources）========
  var MOCK_MODULES = { _schema: "modules-v1", modules: [
    { name: "风骸岛之龙", levels: "1-3", chapters: 4, desc: "标准版" },
    { name: "梵杜尔的失落矿坑__单人粉红向", base: "梵杜尔的失落矿坑", variant: "单人粉红向" }
  ]};
  var MOCK_ALLSAVES = { _schema: "all-saves-v1", campaigns: [
    { name: "风骸岛之龙-小明组", module: "风骸岛之龙", dmStyle: "粉红恋爱向", lastPlayed: "2026-05-26",
      saves: [ { name: "第二章开头", createdAt: "2026-05-26 14:00", chapter: "第二章：海藻洞穴", location: "海藻洞穴入口" } ] },
    { name: "博德之门-王小明的日常3", module: "博德之门日常", dmStyle: "标准", lastPlayed: "2026-05-26", saves: [] }
  ]};
  // 弹窗演示用极简实体卡（点队伍/关系/同行行会查这些）
  var MOCK_FILES = {
    "campaigns/风骸岛之龙-小明组/characters/羽痕.json": { _schema: "character-v1", name: "羽痕", race: "龙裔", classSummary: "术士 3", combat: { hp: { cur: 14, max: 24 }, ac: { base: 13 } } },
    "campaigns/博德之门-王小明的日常3/companions/阿掠.json": { _schema: "companion-v1", name: "阿掠", type: "steeldefender", role: "机械守卫", combat: { hp: { cur: 15, max: 15 } } },
    "campaigns/博德之门-王小明的日常3/npcs/薇拉雅.json": { _schema: "npc-v1", name: "薇拉雅", basics: { race: "人类" }, relationship: { stage: "母性长辈", affinity: 80, affinityMax: 100 } }
  };
  function sourcesFor(sessionData) {
    var entries = Object.keys(MOCK_FILES).map(function (p) {
      return { path: p, size: 100, mtime: 0, parsed: MOCK_FILES[p], content: JSON.stringify(MOCK_FILES[p]) };
    });
    return {
      session: { kind: 'json', data: sessionData },
      campaignFiles: { kind: 'collection', entries: entries },
      allSaves: { kind: 'json', data: MOCK_ALLSAVES },
      modulesIndex: { kind: 'json', data: MOCK_MODULES }
    };
  }

  // 渲染：每个场景一个 iframe，通过 srcdoc 注入 mock ================

  function buildSrcDoc(sceneData) {
    return `<script>window.__PANEL_PREVIEW__ = ${JSON.stringify(sceneData)};<\/script>` +
           `<script>window.skillPanel = undefined;<\/script>`;
  }

  function loadScene(sceneKey) {
    var container = document.getElementById('container');
    container.innerHTML = '';

    var keys = sceneKey === 'all' ? ['sandbox', 'combat', 'idle'] : [sceneKey];
    keys.forEach(function (k) {
      var wrap = document.createElement('div');
      wrap.className = 'frame-wrap';

      var label = document.createElement('div');
      label.className = 'frame-label';
      label.textContent = ({
        sandbox: '🏞 沙盒 (I) · 博德之门日常',
        combat: '⚔ 战斗 (G) · 风骸岛之龙',
        idle: '◴ 未开桌'
      })[k];
      wrap.appendChild(label);

      var iframe = document.createElement('iframe');
      iframe.src = './panel.html';
      iframe.onload = function () {
        // 注入 mock 数据并主动调用 render
        try {
          var win = iframe.contentWindow;
          win.skillPanel = undefined;  // 防止真的等 skillPanel
          win.__PANEL_PREVIEW__ = SCENES[k];
          // 触发 panel.html 内部的预览路径
          if (typeof win.render === 'function') {
            win.render(SCENES[k]);
          } else {
            // panel.html 里如果检测到 __PANEL_PREVIEW__ 会自动 render，
            // 但因为我们在 onload 之后才赋值，需要手动触发一次
            // 这里通过重新执行的方式: dispatch 一个 fake event
            var ev = new Event('preview-ready');
            win.dispatchEvent(ev);
          }
        } catch (e) {
          console.warn('preview inject failed:', e);
        }
      };
      wrap.appendChild(iframe);
      container.appendChild(wrap);
    });
  }

  // 因为 iframe.src=panel.html 加载时 window.__PANEL_PREVIEW__ 还没赋值，
  // panel.html 那段 fallback 检测会失败。最稳的做法：用 srcdoc 提前把 mock 注入。
  // 重写策略 ↓
  function loadSceneWithSrcdoc(sceneKey) {
    var container = document.getElementById('container');
    container.innerHTML = '';

    var keys = sceneKey === 'all' ? ['sandbox', 'combat', 'idle'] : [sceneKey];
    keys.forEach(function (k) {
      var wrap = document.createElement('div');
      wrap.className = 'frame-wrap';

      var label = document.createElement('div');
      label.className = 'frame-label';
      label.textContent = ({
        sandbox: '🏞 沙盒 (I) · 博德之门日常',
        combat: '⚔ 战斗 (G) · 风骸岛之龙',
        idle: '◴ 未开桌'
      })[k];
      wrap.appendChild(label);

      // fetch panel.html 内容，注入 mock 数据，用 srcdoc 喂给 iframe
      fetch('./panel.html').then(function (r) { return r.text(); }).then(function (html) {
        // 在 </head> 前注入 v2 推送 mock：window.__PANEL_SOURCES__（session + campaignFiles
        // + allSaves + modulesIndex），panel.html 的 ingest() 按真实 v2 路径渲染（含弹窗/存档/模组）。
        var inject =
          '<script>window.skillPanel=undefined;window.__PANEL_SOURCES__ = ' +
          JSON.stringify(sourcesFor(SCENES[k])).replace(/<\/script>/g, '<\\/script>') +
          ';<\/script>';
        var modified = html.replace('</head>', inject + '</head>');
        var iframe = document.createElement('iframe');
        iframe.srcdoc = modified;
        wrap.appendChild(iframe);
      });

      container.appendChild(wrap);
    });
  }

  // 按钮切换
  document.querySelectorAll('.preview-bar button').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.preview-bar button').forEach(function (b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      loadSceneWithSrcdoc(btn.getAttribute('data-scene'));
    });
  });

  // 初始加载
  loadSceneWithSrcdoc('all');
</script>

</body>
</html>
